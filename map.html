<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Commute Routes</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

<style>
body {
  margin:0;
  padding:0;
}

#map {
  position:absolute;
  top:0;
  bottom:0;
  width:100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script>

// PUT YOUR MAPBOX TOKEN HERE
mapboxgl.accessToken = "YOUR_MAPBOX_TOKEN_HERE";

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [-0.1276,51.5072],
  zoom: 10
});

map.on('load', function () {

  fetch("https://script.google.com/macros/s/AKfycbyH4arhO1r-cJaRXm6GqKQJHIQpHqFc6H_QOxHcFJzC381vkjqdC5sTb8JConWscqqF/exec")
    .then(response => response.json())
    .then(data => {

      map.addSource('routes', {
        type: 'geojson',
        data: data
      });

      map.addLayer({
        id: 'routes-layer',
        type: 'line',
        source: 'routes',
        layout: {
          'line-join': 'round',
          'line-cap': 'round'
        },
        paint: {
          'line-color': '#ff5500',
          'line-width': 2,
          'line-opacity': 0.7
        }
      });

    });

});

</script>

</body>
</html>
