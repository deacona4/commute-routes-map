!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Routes Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }

    .hud {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      background: rgba(255,255,255,0.92); padding: 10px 12px; border-radius: 10px;
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      min-width: 220px;
    }

    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:8px; }
    .small { font-size: 12px; opacity: 0.8; margin-top: 6px; }
    label { user-select:none; cursor:pointer; }
    input[type="checkbox"] { transform: scale(1.05); }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="hud">
    <b>Live Routes</b>
    <div id="status">Loading…</div>

    <div class="row">
      <label>
        <input id="toggleCulture" type="checkbox" checked />
        Cultural places
      </label>
      <span id="cultureHint" class="small"></span>
    </div>

    <div class="small">Routes auto-refresh every 5s</div>
  </div>

<script>
  mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

  const ROUTES_URL = "https://script.google.com/macros/s/AKfycbwUf3jOG8dojpgbrEs7EosEhTvMTtPRYMj-uy70yl7bZHia7tQod13uqZa-TApG2kO3/exec";

  const REFRESH_MS = 5000;

  // Only load cultural POIs when zoomed in enough (big speed win)
  const MIN_ZOOM_FOR_CULTURE = 12.5;

  const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/light-v11",
    center: [-0.11, 51.51],
    zoom: 11
  });

  map.addControl(new mapboxgl.NavigationControl(), "top-right");

  const statusEl = document.getElementById("status");
  const toggleCultureEl = document.getElementById("toggleCulture");
  const cultureHintEl = document.getElementById("cultureHint");

  // ---- Routes ----
  async function loadRoutes() {
    try {
      const url = ROUTES_URL + "?t=" + Date.now(); // cache buster
      const fc = await (await fetch(url)).json();

      if (!fc || fc.type !== "FeatureCollection") {
        statusEl.textContent = "Endpoint did not return GeoJSON FeatureCollection.";
        return;
      }

      // Preserve cultural status text if present
      const base = statusEl.textContent.split("| Cultural:")[0].trim();
      statusEl.textContent = `Routes: ${fc.features.length}` + (base.includes("| Cultural:") ? (" | " + base.split("| ")[1]) : "");

      if (!map.getSource("routes")) {
        map.addSource("routes", { type: "geojson", data: fc });

        map.addLayer({
          id: "routes-line",
          type: "line",
          source: "routes",
          paint: { "line-width": 3, "line-opacity": 0.85 }
        });
      } else {
        map.getSource("routes").setData(fc);
      }
    } catch (err) {
      statusEl.textContent = "Error loading routes.";
      console.error("Routes error:", err);
    }
  }

  // ---- Cultural places ----
  let culturalMarkers = [];
  let lastCultureKey = null; // simple cache key to avoid repeat fetches

  function clearCulturalMarkers() {
    culturalMarkers.forEach(m => m.remove());
    culturalMarkers = [];
  }

  function getCultureKey() {
    const b = map.getBounds();
    // Round bounds so tiny pans don’t trigger a new fetch
    const r = (x) => Math.round(x * 100) / 100; // ~1km-ish precision depending on lat
    return [
      r(b.getSouth()), r(b.getWest()), r(b.getNorth()), r(b.getEast()),
      Math.round(map.getZoom() * 10) / 10
    ].join(",");
  }

  async function loadCulturalPlaces(force = false) {
    const zoom = map.getZoom();

    if (!toggleCultureEl.checked) {
      cultureHintEl.textContent = "";
      clearCulturalMarkers();
      // Update HUD without clobbering routes count
      const base = statusEl.textContent.split("| Cultural:")[0].trim();
      statusEl.textContent = `${base} | Cultural: off`;
      return;
    }

    if (zoom < MIN_ZOOM_FOR_CULTURE) {
      cultureHintEl.textContent = `Zoom in to load (≥ ${MIN_ZOOM_FOR_CULTURE})`;
      clearCulturalMarkers();
      const base = statusEl.textContent.split("| Cultural:")[0].trim();
      statusEl.textContent = `${base} | Cultural: zoom in`;
      return;
    } else {
      cultureHintEl.textContent = "";
    }

    const key = getCultureKey();
    if (!force && key === lastCultureKey) return; // cached
    lastCultureKey = key;

    try {
      clearCulturalMarkers();

      const bbox = map.getBounds();
      const s = bbox.getSouth(), w = bbox.getWest(), n = bbox.getNorth(), e = bbox.getEast();

      const query = `
      [out:json][timeout:25];
      (
        node["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});
        way["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});
        relation["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});

        node["historic"](${s},${w},${n},${e});
        way["historic"](${s},${w},${n},${e});
        relation["historic"](${s},${w},${n},${e});

        node["amenity"="theatre"](${s},${w},${n},${e});
        way["amenity"="theatre"](${s},${w},${n},${e});
        relation["amenity"="theatre"](${s},${w},${n},${e});
      );
      out center;
      `;

      const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Overpass HTTP ${res.status}`);

      const data = await res.json();

      let count = 0;

      (data.elements || []).forEach(el => {
        const lon = (typeof el.lon === "number") ? el.lon : el.center?.lon;
        const lat = (typeof el.lat === "number") ? el.lat : el.center?.lat;
        if (typeof lon !== "number" || typeof lat !== "number") return;

        const name = el.tags?.name || "Cultural site";
        count++;

        const marker = new mapboxgl.Marker({ color: "#e63946" })
          .setLngLat([lon, lat])
          .setPopup(new mapboxgl.Popup().setHTML(`<b>${name}</b>`))
          .addTo(map);

        culturalMarkers.push(marker);
      });

      const base = statusEl.textContent.split("| Cultural:")[0].trim();
      statusEl.textContent = `${base} | Cultural: ${count}`;
    } catch (err) {
      console.error("Cultural places error:", err);
      const base = statusEl.textContent.split("| Cultural:")[0].trim();
      statusEl.textContent = `${base} | Cultural: error`;
    }
  }

  // ---- Boot + events ----
  map.on("load", async () => {
    await loadRoutes();
    setInterval(loadRoutes, REFRESH_MS);

    // initial culture attempt
    await loadCulturalPlaces(true);

    // reload culture after pan/zoom (debounced)
    let t;
    map.on("moveend", () => {
      clearTimeout(t);
      t = setTimeout(() => loadCulturalPlaces(false), 450);
    });
  });

  toggleCultureEl.addEventListener("change", () => {
    // Force reload when turning on; clear when turning off
    loadCulturalPlaces(true);
  });
</script>
</body>
</html>
