<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Routes Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
    .hud {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      background: rgba(255,255,255,0.92); padding: 12px 14px; border-radius: 12px;
      font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      box-shadow: 0 6px 22px rgba(0,0,0,0.18);
      min-width: 260px;
    }
    .hud b { display:block; margin-bottom:6px; font-size: 16px; }
    .small { font-size: 12px; opacity: 0.8; margin-top: 6px; }
    .row { display:flex; align-items:center; gap:8px; margin: 8px 0; }
    button {
      display:inline-block;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      cursor:pointer;
      font: inherit;
    }
    button:active { transform: translateY(1px); }
    .dim { opacity: 0.6; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="hud">
    <b>Live Routes</b>
    <div id="status">Loading…</div>

    <div class="row">
      <input id="toggleRoutes" type="checkbox" checked />
      <label for="toggleRoutes">Show routes</label>
    </div>

    <div class="row">
      <input id="toggleCultural" type="checkbox" checked />
      <label for="toggleCultural">Show cultural places</label>
    </div>

    <div class="row">
      <button id="refreshCultural">Refresh cultural places</button>
    </div>

    <div class="small">Routes auto-refresh every 5s</div>
    <div class="small dim">Tip: click a cultural point for its name</div>
  </div>

<script>
  // ✅ Mapbox public token (ok on a web page)
  mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

  // ✅ Apps Script Web App endpoint (/exec)
  const ROUTES_URL = "https://script.google.com/macros/s/AKfycbxLgr_yoMOXC1v_KY-YovZ2QklYhHuSNpQ-bJPYBZICT4ly0mST8W0XYqTJBARM17FH/exec";

  const REFRESH_MS = 5000;
  const OVERPASS_URL = "https://overpass-api.de/api/interpreter";

  let showRoutes = true;
  let showCultural = true;

  const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/light-v11",
    center: [-0.11, 51.51],
    zoom: 11
  });

  map.addControl(new mapboxgl.NavigationControl(), "top-right");

  // Optional: keep it around London (helps avoid accidental world/big Overpass queries)
  map.setMaxBounds([
    [-0.55, 51.25], // SW
    [ 0.35, 51.75]  // NE
  ]);

  function setStatus(routesCount, culturalCountText) {
    const statusEl = document.getElementById("status");
    const r = (typeof routesCount === "number") ? `Routes: ${routesCount}` : `Routes: …`;
    const c = (culturalCountText != null) ? ` | Cultural: ${culturalCountText}` : "";
    statusEl.textContent = r + c;
  }

  async function loadRoutes() {
    try {
      // Cache-buster so it actually refreshes
      const url = ROUTES_URL + "?t=" + Date.now();
      const fc = await (await fetch(url)).json();

      if (!fc || fc.type !== "FeatureCollection") {
        setStatus(null, "endpoint error");
        return;
      }

      // Update count without clobbering cultural text
      const statusEl = document.getElementById("status");
      const culturalPart = statusEl.textContent.includes("| Cultural:")
        ? statusEl.textContent.split("| Cultural:")[1].trim()
        : null;

      setStatus(fc.features.length, culturalPart);

      if (!map.getSource("routes")) {
        map.addSource("routes", { type: "geojson", data: fc });

        map.addLayer({
          id: "routes-line",
          type: "line",
          source: "routes",
          paint: {
            "line-width": 3,
            "line-opacity": 0.85
          }
        });
      } else {
        map.getSource("routes").setData(fc);
      }

      // apply toggle state
      if (map.getLayer("routes-line")) {
        map.setLayoutProperty("routes-line", "visibility", showRoutes ? "visible" : "none");
      }

    } catch (err) {
      console.error("Routes error:", err);
      setStatus(null, "routes load error");
    }
  }

  // --- Cultural places as clustered GeoJSON layer (FAST) ---
  async function loadCulturalPlaces() {
    if (!map.getSource("cultural")) return;

    try {
      setStatus(
        // keep existing routes count text
        (() => {
          const t = document.getElementById("status").textContent;
          const m = t.match(/Routes:\s*(\d+)/);
          return m ? Number(m[1]) : null;
        })(),
        "loading…"
      );

      const bbox = map.getBounds();
      const s = bbox.getSouth(), w = bbox.getWest(), n = bbox.getNorth(), e = bbox.getEast();

      // Overpass query: nodes + ways + relations; ways/relations returned with "center"
      const query = `
      [out:json][timeout:25];
      (
        node["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});
        way["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});
        relation["tourism"~"museum|gallery|attraction"](${s},${w},${n},${e});

        node["historic"](${s},${w},${n},${e});
        way["historic"](${s},${w},${n},${e});
        relation["historic"](${s},${w},${n},${e});

        node["amenity"="theatre"](${s},${w},${n},${e});
        way["amenity"="theatre"](${s},${w},${n},${e});
        relation["amenity"="theatre"](${s},${w},${n},${e});
      );
      out center;
      `;

      const url = OVERPASS_URL + "?data=" + encodeURIComponent(query);

      // A tiny bit of resilience: one retry if Overpass is busy
      let res = await fetch(url);
      if (!res.ok) {
        console.warn("Overpass not ok:", res.status, "retrying once…");
        await new Promise(r => setTimeout(r, 1200));
        res = await fetch(url);
      }
      if (!res.ok) throw new Error(`Overpass HTTP ${res.status}`);

      const data = await res.json();

      const features = [];
      for (const el of (data.elements || [])) {
        const lon = (typeof el.lon === "number") ? el.lon : el.center?.lon;
        const lat = (typeof el.lat === "number") ? el.lat : el.center?.lat;
        if (typeof lon !== "number" || typeof lat !== "number") continue;

        const name = el.tags?.name || "Cultural site";

        features.push({
          type: "Feature",
          properties: { name },
          geometry: { type: "Point", coordinates: [lon, lat] }
        });
      }

      map.getSource("cultural").setData({ type: "FeatureCollection", features });

      // apply toggle state
      setCulturalVisibility(showCultural);

      // update HUD
      const routesCount = (() => {
        const t = document.getElementById("status").textContent;
        const m = t.match(/Routes:\s*(\d+)/);
        return m ? Number(m[1]) : null;
      })();

      setStatus(routesCount, features.length);

    } catch (err) {
      console.error("Cultural places error:", err);

      const routesCount = (() => {
        const t = document.getElementById("status").textContent;
        const m = t.match(/Routes:\s*(\d+)/);
        return m ? Number(m[1]) : null;
      })();

      setStatus(routesCount, "error (Overpass busy — try refresh)");
    }
  }

  function setCulturalVisibility(isVisible) {
    const vis = isVisible ? "visible" : "none";
    if (map.getLayer("cultural-clusters")) map.setLayoutProperty("cultural-clusters", "visibility", vis);
    if (map.getLayer("cultural-cluster-count")) map.setLayoutProperty("cultural-cluster-count", "visibility", vis);
    if (map.getLayer("cultural-points")) map.setLayoutProperty("cultural-points", "visibility", vis);
  }

  map.on("load", async () => {
    // Routes source/layer created in loadRoutes()

    // Cultural source + clustered layers created once
    map.addSource("cultural", {
      type: "geojson",
      data: { type: "FeatureCollection", features: [] },
      cluster: true,
      clusterRadius: 50,
      clusterMaxZoom: 14
    });

    map.addLayer({
      id: "cultural-clusters",
      type: "circle",
      source: "cultural",
      filter: ["has", "point_count"],
      paint: {
        "circle-radius": ["step", ["get", "point_count"], 14, 50, 20, 200, 28],
        "circle-opacity": 0.75
      }
    });

    map.addLayer({
      id: "cultural-cluster-count",
      type: "symbol",
      source: "cultural",
      filter: ["has", "point_count"],
      layout: {
        "text-field": "{point_count_abbreviated}",
        "text-size": 12
      }
    });

    map.addLayer({
      id: "cultural-points",
      type: "circle",
      source: "cultural",
      filter: ["!", ["has", "point_count"]],
      paint: {
        "circle-radius": 5,
        "circle-opacity": 0.9
      }
    });

    // Popup on point click
    map.on("click", "cultural-points", (e) => {
      const f = e.features?.[0];
      if (!f) return;
      const name = f.properties?.name || "Cultural site";
      new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<b>${name}</b>`)
        .addTo(map);
    });

    // Zoom into cluster on click
    map.on("click", "cultural-clusters", async (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ["cultural-clusters"] });
      const clusterId = features?.[0]?.properties?.cluster_id;
      if (clusterId == null) return;

      map.getSource("cultural").getClusterExpansionZoom(clusterId, (err, zoom) => {
        if (err) return;
        map.easeTo({ center: features[0].geometry.coordinates, zoom });
      });
    });

    // Cursor pointer on hover
    map.on("mouseenter", "cultural-clusters", () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", "cultural-clusters", () => map.getCanvas().style.cursor = "");
    map.on("mouseenter", "cultural-points", () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", "cultural-points", () => map.getCanvas().style.cursor = "");

    // Initial loads
    await loadRoutes();
    await loadCulturalPlaces();

    // Routes auto-refresh
    setInterval(loadRoutes, REFRESH_MS);

    // If you want cultural places to update when you move, keep this (debounced)
    let t;
    map.on("moveend", () => {
      if (!showCultural) return;
      clearTimeout(t);
      t = setTimeout(loadCulturalPlaces, 500);
    });

    // UI wiring
    document.getElementById("toggleRoutes").addEventListener("change", (e) => {
      showRoutes = e.target.checked;
      if (map.getLayer("routes-line")) {
        map.setLayoutProperty("routes-line", "visibility", showRoutes ? "visible" : "none");
      }
    });

    document.getElementById("toggleCultural").addEventListener("change", (e) => {
      showCultural = e.target.checked;
      setCulturalVisibility(showCultural);
      if (showCultural) loadCulturalPlaces();
    });

    document.getElementById("refreshCultural").addEventListener("click", () => {
      loadCulturalPlaces();
    });
  });
</script>
</body>
</html>
