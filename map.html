<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Live Routes Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

.hud{
position:absolute;
top:12px;
left:12px;
z-index:5;
background:rgba(255,255,255,0.95);
padding:12px 14px;
border-radius:14px;
font:14px system-ui;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.row{display:flex;justify-content:space-between;margin-top:8px}
.small{font-size:12px;opacity:.8}
.btn{border:2px solid #111;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
.divider{height:1px;background:#ddd;margin:10px 0}
</style>
</head>

<body>

<div id="map"></div>

<div class="hud">
<b>Live Routes</b>

<div id="status">Loading…</div>

<div class="row">
<label><input id="toggleRoutes" type="checkbox" checked> Show routes</label>
</div>

<div class="row">
<label><input id="toggleCulture" type="checkbox" checked> Cultural places</label>
</div>

<div class="row">
<label>
Within
<select id="radiusSelect">
<option value="0.25">250m</option>
<option value="0.5" selected>500m</option>
<option value="1">1km</option>
</select>
of routes
</label>
</div>

<div class="row">
<button id="btnRecompute" class="btn">Recompute stats</button>
<button id="btnRefreshCulture" class="btn">Refresh culture</button>
</div>

<div class="divider"></div>

<div id="insights">
<div>Avg cultural within radius: —</div>
<div>Best route: —</div>
<div>Worst route: —</div>
</div>

</div>

<script>

/* CONFIG */

mapboxgl.accessToken =
"pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const ROUTES_URL =
"https://script.google.com/macros/s/AKfycbwUf3jOG8dojpgbrEs7EosEhTvMTtPRYMj-uy70yl7bZHia7tQod13uqZa-TApG2kO3/exec";

const REFRESH_MS = 5000;


/* MAP */

const map = new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/light-v11",
center:[-0.11,51.51],
zoom:11
});

map.addControl(new mapboxgl.NavigationControl(),"top-right");


/* STATE */

let routesFC=null
let culturePoints=[]
let routeStats=new Map()


/* UI */

const statusEl=document.getElementById("status")
const insightsEl=document.getElementById("insights")

const toggleRoutes=document.getElementById("toggleRoutes")
const toggleCulture=document.getElementById("toggleCulture")
const radiusSelect=document.getElementById("radiusSelect")

const btnRecompute=document.getElementById("btnRecompute")
const btnRefreshCulture=document.getElementById("btnRefreshCulture")


function setStatus(t){statusEl.textContent=t}
function getRadius(){return Number(radiusSelect.value)}


/* ROUTES */

async function loadRoutes(){

try{

const url=ROUTES_URL+"?t="+Date.now()
const fc=await (await fetch(url)).json()

routesFC=fc

setStatus("Routes: "+fc.features.length)

if(!map.getSource("routes")){

map.addSource("routes",{type:"geojson",data:fc})

map.addLayer({
id:"routes-line",
type:"line",
source:"routes",
paint:{
"line-width":3,
"line-color":"#2a6df4"
}
})

map.on("click","routes-line",(e)=>{

const route=e.features[0]
const id=route.id||"route"

const stats=routeStats.get(id)
const count=stats?.count??0

new mapboxgl.Popup()
.setLngLat(e.lngLat)
.setHTML("<b>"+id+"</b><br>"+count+" cultural places nearby")
.addTo(map)

})

}else{

map.getSource("routes").setData(fc)

}

}catch(e){

console.error(e)
setStatus("Routes error")

}

}


/* CULTURAL */

async function loadCulture(){

if(!toggleCulture.checked)return

const bbox=map.getBounds()

const query=`
[out:json][timeout:25];
(
node["tourism"~"museum|gallery|attraction"]
(${bbox.getSouth()},${bbox.getWest()},${bbox.getNorth()},${bbox.getEast()});
);
out;
`

const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query)

const data=await (await fetch(url)).json()

culturePoints=[]

data.elements.forEach(el=>{

if(el.lon && el.lat){

const marker=new mapboxgl.Marker({color:"#e63946"})
.setLngLat([el.lon,el.lat])
.setPopup(new mapboxgl.Popup().setHTML(el.tags?.name||"Cultural site"))
.addTo(map)

culturePoints.push({
type:"Feature",
geometry:{type:"Point",coordinates:[el.lon,el.lat]}
})

}

})

}


/* ANALYTICS */

function computeStats(){

if(!routesFC)return

const radius=getRadius()

routeStats.clear()

let counts=[]

routesFC.features.forEach((route,i)=>{

let buffer=turf.buffer(route,radius,{units:"kilometers"})

let count=0

culturePoints.forEach(p=>{
if(turf.booleanPointInPolygon(p,buffer))count++
})

routeStats.set(route.id||i,{count})

counts.push(count)

})

if(!counts.length)return

let avg=counts.reduce((a,b)=>a+b,0)/counts.length
let best=Math.max(...counts)
let worst=Math.min(...counts)

insightsEl.innerHTML=
"Avg cultural within radius: <b>"+avg.toFixed(1)+"</b><br>"+
"Best route: "+best+"<br>"+
"Worst route: "+worst

}


/* UI */

toggleRoutes.onchange=()=>{
map.setLayoutProperty("routes-line","visibility",
toggleRoutes.checked?"visible":"none")
}

btnRefreshCulture.onclick=async()=>{
await loadCulture()
computeStats()
}

btnRecompute.onclick=computeStats

radiusSelect.onchange=computeStats


/* BOOT */

map.on("load",async()=>{

await loadRoutes()
await loadCulture()
computeStats()

setInterval(loadRoutes,REFRESH_MS)

})

</script>

</body>
</html>
