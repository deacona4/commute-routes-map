<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Commute Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

#legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:12px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
font-size:13px;
}

.legend-item{
margin-bottom:5px;
}

.legend-colour{
display:inline-block;
width:12px;
height:12px;
margin-right:6px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="legend">
<b>Commute Routes</b><br><br>
<div class="legend-item"><span class="legend-colour" style="background:#e63946"></span>Train</div>
<div class="legend-item"><span class="legend-colour" style="background:#457b9d"></span>Bus</div>
<div class="legend-item"><span class="legend-colour" style="background:#2a9d8f"></span>Car</div>
<div class="legend-item"><span class="legend-colour" style="background:#f4a261"></span>Walk</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

/* MAPBOX TOKEN */

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

/* CREATE MAP */

const map = new mapboxgl.Map({
container: "map",
style: "mapbox://styles/mapbox/light-v11",
center: [-0.12,51.50],
zoom: 9
});

map.addControl(new mapboxgl.NavigationControl());

/* LOAD ROUTES FROM GOOGLE APPS SCRIPT */

fetch("https://script.google.com/macros/s/AKfycbzvBuo6pFVBbMO2JWD-YEHtftkvl5DsmCZPTRkwLLxMezVwKOlWxc0OIL1vXphQZWa0/exec")
.then(res => res.json())
.then(data => {

map.on("load", () => {

map.addSource("routes",{
type:"geojson",
data:data
});

map.addLayer({
id:"routes",
type:"line",
source:"routes",
layout:{
"line-join":"round",
"line-cap":"round"
},
paint:{
"line-color":"#ff4d4d",
"line-width":3,
"line-opacity":0.7
}
});

/* AUTO ZOOM TO ROUTES */

const bounds = new mapboxgl.LngLatBounds();

data.features.forEach(feature=>{
feature.geometry.coordinates.forEach(coord=>{
bounds.extend(coord);
});
});

if(!bounds.isEmpty()){
map.fitBounds(bounds,{padding:40});
}

});

})
.catch(error=>{
console.error("Error loading routes:",error);
});

</script>

</body>
</html>
