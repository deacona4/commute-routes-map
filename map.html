<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map</title>

<!-- Mapbox CSS -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
}

#map {
  width:100%;
  height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<!-- Mapbox JS -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

// PUT YOUR MAPBOX TOKEN HERE
mapboxgl.accessToken = pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q;

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-0.1276, 51.5072],
    zoom: 10
});

// Load data from your Google Script
fetch("https://script.google.com/macros/s/AKfycbyH4arhO1r-cJaRXm6GqKQJHIQpHqFc6H_QOxHcFJzC381vkjqdC5sTb8JConWscqqF/exec")
.then(res => res.json())
.then(data => {

    data.forEach(place => {

        new mapboxgl.Marker()
            .setLngLat([place.lng, place.lat])
            .setPopup(
                new mapboxgl.Popup().setHTML(
                    `<h3>${place.name}</h3>`
                )
            )
            .addTo(map);

    });

})
.catch(err => console.error(err));

</script>

</body>
</html>
