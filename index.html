/************************************************
UTILITIES
************************************************/

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms))
}

function cacheKeyFromCoord(coord){
return coord[0].toFixed(3)+","+coord[1].toFixed(3);
}

function toRadians(value){
return value*Math.PI/180;
}

var distanceMeters=function(a,b){
var lat1=a[1];
var lng1=a[0];
var lat2=b[1];
var lng2=b[0];
var earthRadius=6371000;
var dLat=toRadians(lat2-lat1);
var dLng=toRadians(lng2-lng1);
var lat1Rad=toRadians(lat1);
var lat2Rad=toRadians(lat2);
var sinLat=Math.sin(dLat/2);
var sinLng=Math.sin(dLng/2);
var hav=(sinLat*sinLat)+(
Math.cos(lat1Rad)*Math.cos(lat2Rad)*sinLng*sinLng
);
return 2*earthRadius*Math.asin(Math.sqrt(hav));
};

var routeLengthKm=function(coords){
var total=0;
for(var i=1;i<coords.length;i++){
total+=distanceMeters(coords[i-1],coords[i]);
}
return total/1000;
};

function interpolateCoord(a,b,ratio){
return [
a[0]+((b[0]-a[0])*ratio),
a[1]+((b[1]-a[1])*ratio)
];
}

var pointAlongRoute=function(coords,distanceKm){
if(!coords.length) return null;
if(coords.length===1) return coords[0];
var traveledMeters=0;
var targetMeters=distanceKm*1000;
for(var i=1;i<coords.length;i++){
var segmentMeters=distanceMeters(coords[i-1],coords[i]);
if(traveledMeters+segmentMeters>=targetMeters){
var remaining=targetMeters-traveledMeters;
var ratio=segmentMeters===0?0:remaining/segmentMeters;
return interpolateCoord(coords[i-1],coords[i],ratio);
}
traveledMeters+=segmentMeters;
}
return coords[coords.length-1];
};

async function reverseGeocode(coord){
const [lng,lat]=coord
const url=`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?types=address,poi,place&limit=1&access_token=${mapboxgl.accessToken}`
try{
const res=await fetch(url)
if(!res.ok) return `${lat.toFixed(5)}, ${lng.toFixed(5)}`
const data=await res.json()
return data.features?.[0]?.place_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`
}catch(e){
return `${lat.toFixed(5)}, ${lng.toFixed(5)}`
}
}

async function createPreviewVideoBlob(){
if(!previewFrames.length) return null

const canvas=document.createElement("canvas")
canvas.width=540
canvas.height=960
const ctx=canvas.getContext("2d")
if(!ctx || !canvas.captureStream || typeof MediaRecorder==="undefined") return null

const stream=canvas.captureStream(2)
const mime=MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9" : "video/webm"
let recorder
try{
recorder=new MediaRecorder(stream,{mimeType:mime})
}catch(e){
return null
}
const chunks=[]

recorder.ondataavailable=e=>{
if(e.data && e.data.size) chunks.push(e.data)
}

const done=new Promise(resolve=>{
recorder.onstop=()=>resolve(new Blob(chunks,{type:"video/webm"}))
})

recorder.start()

for(const src of previewFrames){
const img=new Image()
await new Promise(resolve=>{
img.onload=resolve
img.onerror=resolve
img.src=src
})
ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0,canvas.width,canvas.height)
await sleep(800)
}

recorder.stop()
return await done
}

const url=`https://api.mapbox.com/directions/v5/mapbox/walking/${STATE.startCoords[0]},${STATE.startCoords[1]};${STATE.destinationCoords[0]},${STATE.destinationCoords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`

)

STATE.map.fitBounds(bounds,{padding:60,maxZoom:16,duration:900})

/************************************************
DISCOVERY ENGINE
************************************************/

async function loadEncounters(){

if(!STATE.routeCoords || STATE.routeCoords.length<2) return

setEncounterStatus("Finding discoveries on your route…")
STATE.encounterFetchAttempts=0
STATE.encounterFetchSuccesses=0

clearMarkers()

STATE.encounters=[]

const length = routeLengthKm(STATE.routeCoords)

const scanPoints=[]

/* scan route every ~150m with a hard cap to avoid API rate limits */

const rawSegments = Math.max(1,Math.floor(length*1000/250))
const segments = Math.min(rawSegments,10)

for(let i=0;i<=segments;i++){

const dist=(length/segments)*i

const pt=pointAlongRoute(STATE.routeCoords,dist)

if(pt) scanPoints.push(pt)

}

const candidates=[]
const uniqueScanPoints=[]
const seenScanPoints=new Set()

for(const p of scanPoints){
const key=cacheKeyFromCoord(p)
if(!seenScanPoints.has(key)){
seenScanPoints.add(key)
uniqueScanPoints.push(p)
}
}

for(const p of uniqueScanPoints){

const sites = await fetchNearbySites(p)

if(sites.length) STATE.encounterFetchSuccesses+=1

candidates.push(...sites.map(site=>({...site,routePoint:p})))

/* tiny pause helps prevent 429 bursts on long routes */
await sleep(90)

}

/* score cultural value */

for(const c of candidates){

c.score = scoreCulturalSite(c,c.routePoint)

}

const seenKeys=new Set()

const deduped=[]

for(const c of candidates){
const key=`${c.name}-${c.coords[0].toFixed(5)}-${c.coords[1].toFixed(5)}`
if(!seenKeys.has(key)){
seenKeys.add(key)
deduped.push(c)
}
}

/* sort best first */

deduped.sort((a,b)=>b.score-a.score)

/* spread encounters */

const chosen=[]

const minSpacing = 450

for(const site of deduped){

let tooClose=false

for(const e of chosen){

if(distanceMeters(site.coords,e.coords) < minSpacing){

tooClose=true
break

}

}

if(!tooClose){

chosen.push(site)

}

if(chosen.length >= getEncounterCount()) break

}

if(!chosen.length){
setEncounterStatus("No API results yet — using scenic stops instead.")
const fallbackCount=Math.min(getEncounterCount(),Math.max(2,Math.floor(STATE.routeCoords.length/4)))
for(let i=1;i<=fallbackCount;i++){
const idx=Math.min(
STATE.routeCoords.length-1,
Math.floor((i/(fallbackCount+1))*STATE.routeCoords.length)
)
chosen.push({
name:`Scenic Stop ${i}`,
coords:STATE.routeCoords[idx],
tags:{name:`Scenic Stop ${i}`},
score:0
})
}
}

STATE.encounters = chosen

renderEncounterMarkers()

setEncounterStatus(`${STATE.encounters.length} discoveries ready`,true)
setTimeout(()=>setEncounterStatus("",false),2500)
console.info("encounters_loaded",{count:STATE.encounters.length,fetchAttempts:STATE.encounterFetchAttempts,fetchSuccesses:STATE.encounterFetchSuccesses})

}

/************************************************
DYNAMIC ENCOUNTER COUNT
************************************************/

function getEncounterCount(){

const length=routeLengthKm(STATE.routeCoords)

if(length < 1) return 3
if(length < 2) return 4
if(length < 3) return 5
if(length < 5) return 6

return 7

}

/************************************************
FETCH CULTURAL SITES
************************************************/

async function fetchNearbySites(coord){

const cacheKey=cacheKeyFromCoord(coord)
STATE.encounterFetchAttempts+=1

if(STATE.overpassCache.has(cacheKey)){
return STATE.overpassCache.get(cacheKey)
}

const lat=coord[1]
const lng=coord[0]

const query=`
[out:json][timeout:20];
(
node(around:350,${lat},${lng})["tourism"="museum"];
node(around:350,${lat},${lng})["tourism"="gallery"];
node(around:350,${lat},${lng})["amenity"="theatre"];
node(around:350,${lat},${lng})["tourism"="artwork"];
node(around:350,${lat},${lng})["historic"];
node(around:350,${lat},${lng})["tourism"="attraction"];
);
out;
`

const endpoints=[
"https://overpass.kumi.systems/api/interpreter",
"https://overpass.openstreetmap.fr/api/interpreter"
]

let data

for(let attempt=0;attempt<3;attempt++){

for(const endpoint of endpoints){

try{

const res = await fetch(endpoint,{method:"POST",body:query})

if(res.status===429){
await sleep(600*(attempt+1))
continue
}

if(!res.ok) continue

data = await res.json()
break

}catch(e){

/* try next endpoint */

}

}

if(data) break

await sleep(500*(attempt+1))

}

if(!data?.elements){
STATE.overpassCache.set(cacheKey,[])
return []
}

const sites=[]

for(const el of data.elements){

sites.push({
name:el.tags?.name || "Cultural Site",
coords:[el.lon,el.lat],
tags:el.tags
})

}

STATE.overpassCache.set(cacheKey,sites)

return sites

}

/************************************************
CULTURAL SCORING
************************************************/

function scoreCulturalSite(site,routePoint){

let score = 0

const tags = site.tags || {}

/* cultural importance */

if(tags.tourism === "museum") score += 4
if(tags.tourism === "gallery") score += 3
if(tags.amenity === "theatre") score += 2
if(tags.tourism === "artwork") score += 2
if(tags.historic) score += 2

/* named place */

if(tags.name) score += 1

/* proximity bonus */

const dist = distanceMeters(routePoint,site.coords)

if(dist < 60) score += 2
else if(dist < 120) score += 1

return score

}

/************************************************

************************************************/

async function previewJourney(){

setSearchPanelCollapsed(true)

if(!STATE.routeCoords){
alert("Generate a route first")
return
}

previewFrames=[]

const points=[
STATE.routeCoords[0],
...STATE.encounters.map(e=>e.coords)
]

for(const coord of points){

STATE.map.flyTo({
center:coord,
zoom:17,
pitch:65,
duration:1400
})

pulseEncounter(coord)

await sleep(1550)

/* capture frame */

const frame = captureMapFrame(previewFrames.length)

previewFrames.push(frame)

}

openPreviewPlayer()

}


/************************************************
PREVIEW PLAYER
************************************************/

function openPreviewPlayer(){

if(!previewFrames.length){
alert("No preview frames were generated.")
return
}

const player=document.getElementById("preview-player")
const frame=document.getElementById("preview-frame")

player.style.display="flex"
STATE.previewFrameIndex=0
frame.src=previewFrames[0]

if(STATE.previewInterval){
clearInterval(STATE.previewInterval)
}

STATE.previewInterval=setInterval(()=>{
if(!previewFrames.length) return
STATE.previewFrameIndex=(STATE.previewFrameIndex+1)%previewFrames.length
frame.src=previewFrames[STATE.previewFrameIndex]
},900)

}

function endPreview(){

setSearchPanelCollapsed(false)

const player=document.getElementById("preview-player")
player.style.display="none"

if(STATE.previewInterval){
clearInterval(STATE.previewInterval)
STATE.previewInterval=null
}

}

/************************************************
ENCOUNTER PULSE EFFECT
************************************************/

function pulseEncounter(coord){

STATE.encounters.forEach(site=>{

const dist = distanceMeters(coord,site.coords)

if(dist < 80){

const marker = STATE.markers.find(m=>{

const p = m.getLngLat()

return Math.abs(p.lng-site.coords[0]) < 0.0001

})

if(marker){

const el = marker.getElement()

el.style.transform="scale(1.8)"

setTimeout(()=>{
el.style.transform="scale(1)"
},600)

}

}

})

}

/************************************************
STORY GENERATOR
************************************************/

async function createPreviewStory(){

const canvas=document.createElement("canvas")
canvas.width=1080
canvas.height=1920

const ctx=canvas.getContext("2d")

/* background */

ctx.fillStyle="#fff7ec"
ctx.fillRect(0,0,1080,1920)

/* title */

ctx.fillStyle="#ff2fa3"
ctx.font="bold 80px Inter"
ctx.fillText("Hot Girl Walk",180,180)

ctx.fillStyle="#333"
ctx.font="40px Inter"
ctx.fillText("My Cultural Discoveries",180,260)

/* map preview */

const mapCanvas=STATE.map.getCanvas()

ctx.drawImage(mapCanvas,90,380,900,900)

/* discoveries list */

ctx.fillStyle="#ff2fa3"
ctx.font="36px Inter"

let y=1350

STATE.encounters.forEach(site=>{
ctx.fillText("• "+site.name,140,y)
y+=60
})

/* export story */

canvas.toBlob(async blob=>{

if(!blob) return

const imageFile=new File([blob],"hot-girl-walk-story.png",{type:"image/png"})

const videoBlob=await createPreviewVideoBlob()
const videoFile=videoBlob ? new File([videoBlob],"hot-girl-walk-story.webm",{type:"video/webm"}) : null

if(navigator.share){

try{

await navigator.share({
files:videoFile?[videoFile]:[imageFile],
title:"Hot Girl Walk",
text:"My cultural walk"
})

}catch(e){

/* ignore cancelled share */

}

}else{

const downloadable=videoFile || imageFile
const url=URL.createObjectURL(downloadable)

const a=document.createElement("a")
a.href=url
a.download=downloadable.name
a.click()

}

endPreview()

})

}

/************************************************
WALK MODE
************************************************/

function startWalk(){

setSearchPanelCollapsed(true)

if(!STATE.map){
alert("Start the app first.")
return
}

if(!navigator.geolocation){
alert("Geolocation is not supported in this browser.")
return
}

if(STATE.walkWatcher){
navigator.geolocation.clearWatch(STATE.walkWatcher)
STATE.walkWatcher=null
}

document.getElementById("walk-indicator").style.display="block"

STATE.walkWatcher=navigator.geolocation.watchPosition(updateUserPosition,()=>{
alert("Unable to start walk tracking. Please allow location access.")
})

}

function stopWalk(){

setSearchPanelCollapsed(false)

if(STATE.walkWatcher){
navigator.geolocation.clearWatch(STATE.walkWatcher)
STATE.walkWatcher=null
}

document.getElementById("walk-indicator").style.display="none"

}

/************************************************
USER GPS TRACKING
************************************************/

function updateUserPosition(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!STATE.userMarker){

STATE.userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(STATE.map)

}else{

STATE.userMarker.setLngLat(coords)

}

STATE.map.easeTo({
center:coords,
zoom:16
})

}
