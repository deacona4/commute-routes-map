<body>

<div id="home-screen">
<div class="home-title">Hot Girl Walk</div>
<div class="home-sub">Turn everyday routes into cultural discovery</div>
<div class="home-buttons">
<button onclick="startApp()">Start Walk</button>
</div>
</div>

<div id="search-panel">

<div id="start-search"></div>
<button id="gps-btn">Use my GPS</button>

<div id="dest-search"></div>

<button id="route-button">Generate Route</button>

</div>

<div id="nav">
<button onclick="previewJourney()">Preview</button>
<button onclick="startWalk()">Start</button>
<button onclick="pauseWalk()">Pause</button>
<button onclick="resumeWalk()">Resume</button>
<button onclick="endWalk()">End</button>
<button onclick="toggleMemories()">Memories</button>
<button onclick="shareJourney()">Share</button>
</div>

<div id="map"></div>

<div id="encounter">

<img id="encounter-photo">

<h3 id="encounter-title"></h3>

<div id="prompt"></div>

<div>Beauty <input id="rating-beauty" type="number" min="1" max="5" value="3"></div>
<div>History <input id="rating-history" type="number" min="1" max="5" value="3"></div>
<div>Hidden Gem <input id="rating-hidden" type="number" min="1" max="5" value="3"></div>

<textarea id="note" placeholder="Write reflection..."></textarea>

<br><br>

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>

<script>

mapboxgl.accessToken="YOUR_MAPBOX_TOKEN"

const API_URL="YOUR_APPS_SCRIPT_URL"

let map
let routeCoords=null
let markers=[]
let archiveMarkers=[]

let destinationCoords=null
let startCoords=null

let userMarker=null
let watchId=null

let USER_ID=localStorage.getItem("hg_user")

if(!USER_ID){
USER_ID=crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)
}

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

startGPS()

initSearch()

}
/* ----------------------------------------------------
WIKIPEDIA IMAGE LOOKUP
---------------------------------------------------- */

let wikiCache=new Map()

async function fetchWiki(siteName){

if(wikiCache.has(siteName)){
return wikiCache.get(siteName)
}

try{

const searchURL=
`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(siteName)}&format=json&origin=*`

const searchRes=await fetch(searchURL)
const searchData=await searchRes.json()

if(!searchData.query.search.length){
return null
}

const pageTitle=searchData.query.search[0].title

const summaryURL=
`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`

const res=await fetch(summaryURL)
const data=await res.json()

wikiCache.set(siteName,data)

return data

}catch{

return null

}

}

/* ----------------------------------------------------
REFLECTION PROMPTS
---------------------------------------------------- */

async function fetchPrompt(){

const prompts=await fetch(API_URL+"?action=prompts")
.then(r=>r.json())

return prompts[Math.floor(Math.random()*prompts.length)]

}

/* ----------------------------------------------------
OPEN ENCOUNTER CARD
---------------------------------------------------- */

let currentEncounter=null

async function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title")
.innerText=site.name

const wiki=await fetchWiki(site.name)

if(wiki?.thumbnail){

document.getElementById("encounter-photo")
.src=wiki.thumbnail.source

}

const prompt=await fetchPrompt()

document.getElementById("prompt")
.innerText=prompt

document.getElementById("encounter")
.style.display="block"

}

/* ----------------------------------------------------
CLOSE ENCOUNTER
---------------------------------------------------- */

function closeEncounter(){

document.getElementById("encounter")
.style.display="none"

}

/* ----------------------------------------------------
SAVE ENCOUNTER → GOOGLE SHEETS
---------------------------------------------------- */

async function saveEncounter(){

if(!currentEncounter) return

const payload={

action:"encounter",

user_id:USER_ID,

site_name:currentEncounter.name,

note:document.getElementById("note").value,

lat:currentEncounter.coords[1],
lng:currentEncounter.coords[0],

beauty:document.getElementById("rating-beauty").value,
history:document.getElementById("rating-history").value,
hidden_gem:document.getElementById("rating-hidden").value

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

addMemoryMarker(currentEncounter)

closeEncounter()

alert("Memory saved!")

}

/* ----------------------------------------------------
MEMORY MARKERS
---------------------------------------------------- */

function addMemoryMarker(site){

const marker=new mapboxgl.Marker({color:"blue"})
.setLngLat(site.coords)
.addTo(map)

archiveMarkers.push(marker)

}

/* ----------------------------------------------------
TOGGLE MEMORIES
---------------------------------------------------- */

async function toggleMemories(){

archiveMarkers.forEach(m=>m.remove())
archiveMarkers=[]

const data=await fetch(API_URL+"?action=encounters")
.then(r=>r.json())

data.forEach(e=>{

if(!e.lng||!e.lat) return

const marker=new mapboxgl.Marker({color:"blue"})
.setLngLat([e.lng,e.lat])
.addTo(map)

archiveMarkers.push(marker)

})

}

/* ----------------------------------------------------
START WALK
---------------------------------------------------- */

function startWalk(){

if(!routeCoords){

alert("Generate a route first")

return

}

if(watchId) return

watchId=navigator.geolocation.watchPosition(updateWalk)

}

/* ----------------------------------------------------
PAUSE WALK
---------------------------------------------------- */

function pauseWalk(){

if(!watchId) return

navigator.geolocation.clearWatch(watchId)

watchId=null

}

/* ----------------------------------------------------
RESUME WALK
---------------------------------------------------- */

function resumeWalk(){

if(watchId) return

watchId=navigator.geolocation.watchPosition(updateWalk)

}

/* ----------------------------------------------------
END WALK
---------------------------------------------------- */

function endWalk(){

if(!watchId) return

navigator.geolocation.clearWatch(watchId)

watchId=null

map.easeTo({
pitch:0,
bearing:0,
zoom:14
})

}

/* ----------------------------------------------------
LIVE WALK CAMERA
---------------------------------------------------- */

let lastPosition=null

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

let bearing=0

if(lastPosition){

bearing=turf.bearing(
turf.point(lastPosition),
turf.point(coords)
)

}

lastPosition=coords

map.easeTo({

center:coords,
zoom:17,
pitch:60,
bearing:bearing,
duration:800

})

checkNearbySites(coords)

}

/* ----------------------------------------------------
AUTO ENCOUNTER TRIGGER
---------------------------------------------------- */

function checkNearbySites(userCoords){

markers.forEach(marker=>{

const site=marker.site

const dist=turf.distance(
turf.point(userCoords),
turf.point(site.coords),
{units:"meters"}
)

if(dist<40){

openEncounter(site)

}

})

}

/* ----------------------------------------------------
SHARE WALK CARD
---------------------------------------------------- */

async function shareJourney(){

const canvas=await html2canvas(document.body)

canvas.toBlob(async blob=>{

const file=new File([blob],"hot-girl-walk.png",{type:"image/png"})

if(navigator.share){

await navigator.share({
title:"Hot Girl Walk",
text:"Look what I discovered on my walk ✨",
files:[file]
})

}else{

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="hot-girl-walk.png"

link.click()

}

})

}

/* ----------------------------------------------------
END SCRIPT
---------------------------------------------------- */

</script>
