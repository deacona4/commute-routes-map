<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
}

#map{
width:100%;
height:100vh;
}

/* HOME */

#home-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2fa3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
}

.home-title{
font-size:64px;
font-weight:800;
color:white;
}

.home-sub{
color:white;
margin-top:10px;
}

.home-buttons{
margin-top:30px;
}

.home-buttons button{
padding:14px 26px;
border:none;
border-radius:10px;
background:white;
color:#ff2fa3;
font-weight:700;
cursor:pointer;
}

/* SEARCH PANEL */

#search-panel{
position:absolute;
top:20px;
right:20px;
background:white;
padding:14px;
border-radius:12px;
box-shadow:0 4px 16px rgba(0,0,0,0.2);
z-index:5;
width:320px;
display:flex;
flex-direction:column;
gap:10px;
}

#route-button{
padding:10px;
border:none;
background:#ff2fa3;
color:white;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

/* NAV */

#nav{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 14px;
border-radius:20px;
box-shadow:0 4px 16px rgba(0,0,0,.2);
z-index:5;
}

#nav button{
border:none;
background:none;
margin:0 6px;
font-weight:600;
cursor:pointer;
}

/* ENCOUNTER CARD */

#encounter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
display:none;
z-index:10;
}

#encounter img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

textarea{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div id="home-screen">

<div class="home-title">Hot Girl Walk</div>

<div class="home-sub">
Turn everyday routes into cultural discovery
</div>

<div class="home-buttons">
<button onclick="startApp()">Start Walk</button>
</div>

</div>

<div id="search-panel">

<div id="start-search"></div>
<div id="dest-search"></div>

<button id="route-button">Generate Route</button>

</div>

<div id="nav">

<button onclick="previewJourney()">Preview</button>
<button onclick="startWalk()">Walk</button>
<button onclick="toggleMemories()">Memories</button>

</div>

<div id="map"></div>

<div id="encounter">

<img id="encounter-photo">

<h3 id="encounter-title"></h3>

<div id="prompt"></div>

<div>Beauty <input id="rating-beauty" type="number" min="1" max="5" value="3"></div>
<div>History <input id="rating-history" type="number" min="1" max="5" value="3"></div>
<div>Hidden Gem <input id="rating-hidden" type="number" min="1" max="5" value="3"></div>

<textarea id="note" placeholder="Write reflection..."></textarea>

<br><br>

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>

<script>

mapboxgl.accessToken="YOUR_MAPBOX_TOKEN"

const API_URL="YOUR_APPS_SCRIPT_URL"

let map
let routeCoords=null
let markers=[]
let archiveMarkers=[]
let destinationCoords=null
let startCoords=null
let userMarker=null
let watchId=null

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

startGPS()

initSearch()

}

<script>

mapboxgl.accessToken="YOUR_MAPBOX_TOKEN"

const API_URL="YOUR_APPS_SCRIPT_URL"

let map
let routeCoords=null
let markers=[]
let archiveMarkers=[]
let destinationCoords=null
let startCoords=null
let userMarker=null
let watchId=null

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

startGPS()

initSearch()

}
async function loadEncounters(coords){

markers.forEach(m=>m.remove())
markers=[]

const line=turf.lineString(coords)
const bbox=turf.bbox(line)

const query=`
[out:json];
(
node["tourism"~"museum|gallery"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["historic"~"monument|memorial"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
);
out center;
`

const res=await fetch(
"https://overpass.kumi.systems/api/interpreter",
{method:"POST",body:query}
)

const data=await res.json()

const sites=data.elements.map(el=>{

const lon=el.lon||el.center?.lon
const lat=el.lat||el.center?.lat

if(!lon||!lat) return null
if(!el.tags?.name) return null

return{
name:el.tags.name,
coords:[lon,lat]
}

}).filter(Boolean)

sites.slice(0,4).forEach((site,i)=>{

const el=document.createElement("div")

el.style.width="28px"
el.style.height="28px"
el.style.borderRadius="50%"
el.style.background="#ff2fa3"
el.style.color="white"
el.style.display="flex"
el.style.alignItems="center"
el.style.justifyContent="center"
el.innerText=i+1

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(map)

marker.site=site

marker.getElement().onclick=()=>openEncounter(site)

markers.push(marker)

})

}

async function previewJourney(){

if(!markers.length) return

for(const marker of markers){

map.flyTo({
center:marker.getLngLat(),
zoom:16
})

await new Promise(r=>setTimeout(r,2000))

openEncounter(marker.site)

}

}
