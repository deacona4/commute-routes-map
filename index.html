<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Cultural Commute Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
width:100%;
height:100vh;
}

/* ROUTE INPUT */

#route-input{
position:absolute;
top:20px;
left:20px;
z-index:2;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
}

#route-input input{
display:block;
margin-bottom:6px;
padding:6px;
width:170px;
}

#route-input button{
padding:6px;
width:100%;
cursor:pointer;
}

/* LEGEND */

.legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
z-index:2;
}

.legend div{
margin-bottom:5px;
}

.route-box{
width:20px;
height:4px;
background:#2a7de1;
display:inline-block;
margin-right:6px;
}

.user-route-box{
width:20px;
height:4px;
background:#ff5500;
display:inline-block;
margin-right:6px;
}

.culture-box{
width:10px;
height:10px;
background:red;
display:inline-block;
margin-right:6px;
}

</style>

</head>

<body>

<div id="route-input">

<input id="home" placeholder="Home postcode">
<input id="work" placeholder="Work postcode">

<button onclick="createRoute()">Show My Route</button>

</div>

<div id="map"></div>

<div class="legend">
<div><span class="route-box"></span>Saved Commute Routes</div>
<div><span class="user-route-box"></span>Your Route</div>
<div><span class="culture-box"></span>Cultural Venues</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const API_URL = "https://script.google.com/macros/s/AKfycbyUuMmIknHTwP3hoKYYw0-eka1wk3X8BJSOqLua4q4DIVDCGhWaa6LUTeILGjEQv33L/exec";

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});

map.on('load', function () {

loadRoutes();
loadCulturalSites();

});

function loadRoutes(){

fetch(API_URL + "?action=routes")
.then(res => res.json())
.then(data => {

map.addSource("routes", {
type: "geojson",
data: data
});

map.addLayer({
id: "routes",
type: "line",
source: "routes",
layout: {
"line-join": "round",
"line-cap": "round"
},
paint: {
"line-color": "#2a7de1",
"line-width": 4,
"line-opacity": 0.7
}
});

});

}

function createRoute(){

const home = document.getElementById("home").value;
const work = document.getElementById("work").value;

if(!home || !work){
alert("Please enter both postcodes");
return;
}

const url =
API_URL +
"?action=route" +
"&home=" + encodeURIComponent(home) +
"&work=" + encodeURIComponent(work);

fetch(url)
.then(res => res.json())
.then(route => {

if(map.getSource("user-route")){
map.getSource("user-route").setData(route);
return;
}

map.addSource("user-route",{
type:"geojson",
data:route
});

map.addLayer({
id:"user-route",
type:"line",
source:"user-route",
paint:{
"line-color":"#ff5500",
"line-width":6
}
});

});

}

function loadCulturalSites(){

const query = `
[out:json];
(
node["tourism"="museum"](51.3,-0.3,51.7,0.2);
node["tourism"="gallery"](51.3,-0.3,51.7,0.2);
node["amenity"="theatre"](51.3,-0.3,51.7,0.2);
node["amenity"="arts_centre"](51.3,-0.3,51.7,0.2);
);
out;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(res => res.json())
.then(data => {

data.elements.forEach(place => {

new mapboxgl.Marker({color:"red"})
.setLngLat([place.lon,place.lat])
.setPopup(
new mapboxgl.Popup().setHTML(place.tags?.name || "Cultural Venue")
)
.addTo(map);

});

});

}

</script>

</body>
</html>
