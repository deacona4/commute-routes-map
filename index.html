<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Cultural Commute Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
width:100%;
height:100vh;
}

.legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
}

.legend div{
margin-bottom:5px;
}

.route-box{
width:20px;
height:4px;
background:#2a7de1;
display:inline-block;
margin-right:6px;
}

.culture-box{
width:10px;
height:10px;
background:red;
display:inline-block;
margin-right:6px;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="legend">
<div><span class="route-box"></span>Commute Routes</div>
<div><span class="culture-box"></span>Cultural Venues</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});

map.on("load", () => {


// LOAD ROUTES

fetch("https://script.google.com/macros/s/AKfycbzvBuo6pFVBbMO2JWD-YEHtftkvl5DsmCZPTRkwLLxMezVwKOlWxc0OIL1vXphQZWa0/exec")
.then(res => res.json())
.then(data => {

map.addSource("routes",{
type:"geojson",
data:data
});

map.addLayer({
id:"routes",
type:"line",
source:"routes",
paint:{
"line-color":"#2a7de1",
"line-width":4,
"line-opacity":0.8
}
});

// auto zoom to routes

const bounds = new mapboxgl.LngLatBounds();

data.features.forEach(feature=>{
feature.geometry.coordinates.forEach(coord=>{
bounds.extend(coord);
});
});

map.fitBounds(bounds,{padding:50});

});




// LOAD CULTURAL VENUES (OVERPASS)

const query = `
[out:json];
(
node["tourism"="museum"](51.3,-0.3,51.7,0.2);
node["tourism"="gallery"](51.3,-0.3,51.7,0.2);
node["amenity"="theatre"](51.3,-0.3,51.7,0.2);
node["amenity"="arts_centre"](51.3,-0.3,51.7,0.2);
);
out;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(res=>res.json())
.then(data=>{

data.elements.forEach(place=>{

new mapboxgl.Marker({color:"red"})
.setLngLat([place.lon,place.lat])
.setPopup(
new mapboxgl.Popup().setHTML(
`<b>${place.tags?.name || "Cultural venue"}</b>`
)
)
.addTo(map);

});

});

});

</script>

</html>
