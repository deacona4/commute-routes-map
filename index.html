<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cultural Walk Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
width:100%;
height:100vh;
}

#route-input{
position:absolute;
top:20px;
left:20px;
z-index:2;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

#route-input input{
display:block;
margin-bottom:6px;
padding:6px;
width:170px;
}

#route-input button{
padding:6px;
width:100%;
cursor:pointer;
}

.legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
}

.user-route-box{
width:20px;
height:4px;
background:#ff5500;
display:inline-block;
margin-right:6px;
}

.culture-box{
width:10px;
height:10px;
background:red;
display:inline-block;
margin-right:6px;
}

</style>
</head>

<body>

<div id="route-input">
<input id="home" placeholder="Start location">
<input id="work" placeholder="Destination">
<button onclick="createRoute()">Show Route</button>
</div>

<div id="map"></div>

<div class="legend">
<div><span class="user-route-box"></span>Your Route</div>
<div><span class="culture-box"></span>Cultural Encounters</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const API_URL = "https://script.google.com/macros/s/AKfycbz0BqxLHAajt3BKJJC0P6tr8DPVOd-MV8l2UBlh90dHImV3mrrv2Qa80Q7-yHkHNHxc/exec";

let encounterMarkers=[];

const culturalSites=[

{ name:"Tate Modern", coords:[-0.0994,51.5076] },
{ name:"Globe Theatre", coords:[-0.0973,51.5081] },
{ name:"St Pauls Cathedral", coords:[-0.0983,51.5138] },
{ name:"Whitechapel Gallery", coords:[-0.0719,51.5162] },
{ name:"Imperial War Museum", coords:[-0.1087,51.4966] },
{ name:"Dennis Severs House", coords:[-0.0736,51.5235] },
{ name:"Museum of London", coords:[-0.0956,51.5175] },
{ name:"Guildhall Art Gallery", coords:[-0.0922,51.5155] }

];

const map=new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});

function createRoute(){

const home=document.getElementById("home").value;
const work=document.getElementById("work").value;

const url=API_URL+
"?action=route"+
"&home="+encodeURIComponent(home)+
"&work="+encodeURIComponent(work);

fetch(url)
.then(res=>res.json())
.then(data=>{

/* Always extract Mapbox route correctly */

let coords;

if(data.routes){
coords=data.routes[0].geometry.coordinates;
}
else if(data.features){
coords=data.features[0].geometry.coordinates;
}
else if(data.route){
coords=data.route.features[0].geometry.coordinates;
}
else{
alert("Route could not be generated.");
return;
}

const geojson={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{
type:"LineString",
coordinates:coords
}
}]
};

if(map.getSource("user-route")){
map.getSource("user-route").setData(geojson);
}else{

map.addSource("user-route",{
type:"geojson",
data:geojson
});

map.addLayer({
id:"user-route",
type:"line",
source:"user-route",
paint:{
"line-color":"#ff5500",
"line-width":6
}
});

}

showEncounters(coords);

});

}

function showEncounters(coords){

encounterMarkers.forEach(m=>m.remove());
encounterMarkers=[];

const line=turf.lineString(coords);

const length=turf.length(line,{units:"kilometers"});

const segments=4;

let used=new Set();

for(let i=1;i<=segments;i++){

const pt=turf.along(line,(length/segments)*i,{units:"kilometers"});

let best=null;
let min=Infinity;

culturalSites.forEach(site=>{

if(used.has(site.name))return;

const d=turf.distance(pt,turf.point(site.coords),{units:"kilometers"});

if(d<min){
min=d;
best=site;
}

});

if(best){

used.add(best.name);

const marker=new mapboxgl.Marker({color:"red"})
.setLngLat(best.coords)
.setPopup(new mapboxgl.Popup().setHTML(best.name))
.addTo(map);

encounterMarkers.push(marker);

}

}

}

</script>

</body>
</html>
