<script>

/* CONFIG */

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbyTSX4rYwP5A8ScTUnmphdKRS7AlGWwdcLkDSNC-6HJTG4vEZeNFmMZLoUL0DXzKMAV/exec"


/* STATE */

let map
let routeCoords=null

let markers=[]
let archiveMarkers=[]

let destinationCoords=null
let startCoords=null

let userMarker=null
let lastPosition=null

let watchId=null
let walkActive=false

let selectedCulture=[]

let USER_ID = localStorage.getItem("hg_user")

if(!USER_ID){

USER_ID = crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)

}


/* START APP */

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}


/* MAP */

function initMap(){

if(map) return

map=new mapboxgl.Map({

container:"map",

style:"mapbox://styles/mapbox/streets-v12",

center:[-0.1276,51.5072],

zoom:12

})

map.addControl(new mapboxgl.NavigationControl())

startGPS()

initSearch()

}


/* GPS BLUE DOT */

function startGPS(){

navigator.geolocation.watchPosition(

pos=>{

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

map.setCenter(coords)

}else{

userMarker.setLngLat(coords)

}

},

err=>{
console.log("GPS error",err)
},

{
enableHighAccuracy:true
}

)

}


/* RESET JOURNEY */

function resetJourney(){

routeCoords=null

markers.forEach(m=>m.remove())
markers=[]

if(map.getSource("route")){

map.removeLayer("route")
map.removeSource("route")

}

}

/* CONFIG */

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbyTSX4rYwP5A8ScTUnmphdKRS7AlGWwdcLkDSNC-6HJTG4vEZeNFmMZLoUL0DXzKMAV/exec"


/* STATE */

let map
let routeCoords=null

let markers=[]
let archiveMarkers=[]

let destinationCoords=null
let startCoords=null

let userMarker=null
let lastPosition=null

let watchId=null
let walkActive=false

let selectedCulture=[]

let USER_ID = localStorage.getItem("hg_user")

if(!USER_ID){

USER_ID = crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)

}


/* START APP */

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}


/* MAP */

function initMap(){

if(map) return

map=new mapboxgl.Map({

container:"map",

style:"mapbox://styles/mapbox/streets-v12",

center:[-0.1276,51.5072],

zoom:12

})

map.addControl(new mapboxgl.NavigationControl())

startGPS()

initSearch()

}


/* GPS BLUE DOT */

function startGPS(){

navigator.geolocation.watchPosition(

pos=>{

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

map.setCenter(coords)

}else{

userMarker.setLngLat(coords)

}

},

err=>{
console.log("GPS error",err)
},

{
enableHighAccuracy:true
}

)

}


/* RESET JOURNEY */

function resetJourney(){

routeCoords=null

markers.forEach(m=>m.remove())
markers=[]

if(map.getSource("route")){

map.removeLayer("route")
map.removeSource("route")

}

}
/* ----------------------------------------------------
ENCOUNTER CARD
---------------------------------------------------- */

const encounterHTML = `
<div id="encounter" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
display:none;
z-index:10;
">

<img id="encounter-photo" style="
width:100%;
height:160px;
object-fit:cover;
border-radius:8px
">

<h3 id="encounter-title"></h3>

<div id="prompt" style="font-style:italic;margin-bottom:10px"></div>

<div>
Beauty
<input id="rating-beauty" type="number" min="1" max="5" value="3">
</div>

<div>
History
<input id="rating-history" type="number" min="1" max="5" value="3">
</div>

<div>
Hidden Gem
<input id="rating-hidden" type="number" min="1" max="5" value="3">
</div>

<textarea id="note" placeholder="Write reflection..." style="width:100%;margin-top:8px"></textarea>

<br><br>

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>
`

document.body.insertAdjacentHTML("beforeend", encounterHTML)



/* ----------------------------------------------------
WIKIPEDIA IMAGE
---------------------------------------------------- */

let wikiCache=new Map()

async function fetchWiki(siteName){

if(wikiCache.has(siteName)) return wikiCache.get(siteName)

try{

const searchURL=
`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(siteName)}&format=json&origin=*`

const searchRes=await fetch(searchURL)
const searchData=await searchRes.json()

if(!searchData.query.search.length) return null

const pageTitle=searchData.query.search[0].title

const summaryURL=
`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`

const res=await fetch(summaryURL)
const data=await res.json()

wikiCache.set(siteName,data)

return data

}catch{

return null

}

}



/* ----------------------------------------------------
REFLECTION PROMPTS
---------------------------------------------------- */

async function fetchPrompt(){

const prompts=await fetch(API_URL+"?action=prompts").then(r=>r.json())

return prompts[Math.floor(Math.random()*prompts.length)]

}



/* ----------------------------------------------------
OPEN ENCOUNTER
---------------------------------------------------- */

let currentEncounter=null

async function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

const wiki=await fetchWiki(site.name)

if(wiki?.thumbnail){
document.getElementById("encounter-photo").src=wiki.thumbnail.source
}

const prompt=await fetchPrompt()

document.getElementById("prompt").innerText=prompt

document.getElementById("encounter").style.display="block"

}



/* ----------------------------------------------------
CLOSE ENCOUNTER
---------------------------------------------------- */

function closeEncounter(){
document.getElementById("encounter").style.display="none"
}



/* ----------------------------------------------------
SAVE ENCOUNTER → GOOGLE SHEETS
---------------------------------------------------- */

async function saveEncounter(){

if(!currentEncounter) return

const payload={

action:"encounter",

user_id:USER_ID,

site_name:currentEncounter.name,

note:document.getElementById("note").value,

lat:currentEncounter.coords[1],

lng:currentEncounter.coords[0],

beauty:document.getElementById("rating-beauty").value,

history:document.getElementById("rating-history").value,

hidden_gem:document.getElementById("rating-hidden").value,

category:"culture"

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

addMemoryMarker(currentEncounter)

closeEncounter()

alert("Saved as memory!")

}



/* ----------------------------------------------------
MEMORY MARKERS
---------------------------------------------------- */

function addMemoryMarker(site){

const el=document.createElement("div")

el.style.width="30px"
el.style.height="30px"
el.style.borderRadius="50%"
el.style.background="#2b7cff"
el.style.border="3px solid white"

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(map)

archiveMarkers.push(marker)

}



/* ----------------------------------------------------
LOAD SAVED MEMORIES
---------------------------------------------------- */

async function loadEncounterArchive(){

const data=await fetch(API_URL+"?action=encounters").then(r=>r.json())

data.forEach(e=>{

if(!e.lng||!e.lat) return

const marker=new mapboxgl.Marker({color:"blue"})
.setLngLat([e.lng,e.lat])
.addTo(map)

archiveMarkers.push(marker)

})

}

function toggleMemories(){

if(archiveMarkers.length){

archiveMarkers.forEach(m=>m.remove())
archiveMarkers=[]

return

}

loadEncounterArchive()

}



/* ----------------------------------------------------
START WALK
---------------------------------------------------- */

function startWalk(){

if(!routeCoords){
alert("Generate route first")
return
}

if(walkActive) return

walkActive=true

watchId=navigator.geolocation.watchPosition(updateWalk)

}



/* ----------------------------------------------------
GPS WALK CAMERA
---------------------------------------------------- */

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

let bearing=0

if(lastPosition){

bearing=turf.bearing(
turf.point(lastPosition),
turf.point(coords)
)

}

lastPosition=coords

map.easeTo({

center:coords,
zoom:17,
pitch:60,
bearing:bearing,
duration:800

})

checkNearbySites(coords)

}



/* ----------------------------------------------------
AUTO ENCOUNTER TRIGGER
---------------------------------------------------- */

function checkNearbySites(userCoords){

markers.forEach(marker=>{

const site=marker.site

const dist=turf.distance(
turf.point(userCoords),
turf.point(site.coords),
{units:"meters"}
)

if(dist<40){

openEncounter(site)

}

})

}



/* ----------------------------------------------------
SHARE WALK
---------------------------------------------------- */

async function shareJourney(){

const canvas=await html2canvas(document.body)

canvas.toBlob(async blob=>{

const file=new File([blob],"hot-girl-walk.png",{type:"image/png"})

if(navigator.share){

await navigator.share({

title:"Hot Girl Walk",

text:"Look what I discovered on my walk ✨",

files:[file]

})

}else{

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="hot-girl-walk.png"

link.click()

}

})

}
/* ----------------------------------------------------
SEARCH BAR WIDTH FIX
---------------------------------------------------- */

document.addEventListener("DOMContentLoaded",()=>{

const style=document.createElement("style")

style.innerHTML=`

.mapboxgl-ctrl-geocoder{
width:100% !important;

}

/* ----------------------------------------------------
LOADING OVERLAY HELPERS
---------------------------------------------------- */

function showLoading(){

document.getElementById("loading").style.display="flex"

}

function hideLoading(){

document.getElementById("loading").style.display="none"

}



/* ----------------------------------------------------
ROUTE BUTTON UX
---------------------------------------------------- */

function safeGenerateRoute(){

if(!destinationCoords){

alert("Choose a destination")

return

}

resetJourney()

showLoading()

if(startCoords){

generateRoute(startCoords)

}else{

navigator.geolocation.getCurrentPosition(pos=>{

const start=[pos.coords.longitude,pos.coords.latitude]

generateRoute(start)

})

}

}



/* ----------------------------------------------------
OVERRIDE GO BUTTON
---------------------------------------------------- */

document.addEventListener("DOMContentLoaded",()=>{

const btn=document.getElementById("route-button")

if(btn){

btn.onclick=safeGenerateRoute

}

})



/* ----------------------------------------------------
HIDE LOADING AFTER ROUTE
---------------------------------------------------- */

const originalGenerateRoute = generateRoute

generateRoute = async function(start){

await originalGenerateRoute(start)

hideLoading()

}



/* ----------------------------------------------------
CULTURE FILTER CHIP LOGIC
---------------------------------------------------- */

async function initCultureFilters(){

const types=await fetch(API_URL+"?action=cultureTypes").then(r=>r.json())

const container=document.getElementById("culture-filter")

container.innerHTML=""

types.forEach(type=>{

const chip=document.createElement("div")

chip.className="filter-chip"

chip.innerText=type

chip.onclick=()=>{

chip.classList.toggle("active")

if(selectedCulture.includes(type)){

selectedCulture=selectedCulture.filter(t=>t!==type)

}else{

selectedCulture.push(type)

}

}

container.appendChild(chip)

})

}

initCultureFilters()



/* ----------------------------------------------------
GPS PERMISSION DEBUG
---------------------------------------------------- */

function checkGPS(){

if(!navigator.geolocation){

alert("GPS not supported")

return

}

navigator.geolocation.getCurrentPosition(

pos=>{
console.log("GPS working",pos.coords)
},

err=>{
console.log("GPS permission error",err)
}

)

}

checkGPS()



/* ----------------------------------------------------
PAUSE / RESUME WALK
---------------------------------------------------- */

function pauseWalk(){

if(!watchId) return

navigator.geolocation.clearWatch(watchId)

walkActive=false

}

function resumeWalk(){

if(walkActive) return

watchId=navigator.geolocation.watchPosition(updateWalk)

walkActive=true

}



/* ----------------------------------------------------
AUTO GPS START LOCATION
---------------------------------------------------- */

function autoSetStart(){

navigator.geolocation.getCurrentPosition(pos=>{

startCoords=[

pos.coords.longitude,

pos.coords.latitude

]

})

}

autoSetStart()



/* ----------------------------------------------------
BETTER MOBILE PANEL BEHAVIOUR
---------------------------------------------------- */

function collapseSearch(){

const panel=document.getElementById("search-panel")

if(window.innerWidth<700){

panel.style.opacity="0.95"

}

}

window.addEventListener("resize",collapseSearch)

collapseSearch()



/* ----------------------------------------------------
ENCOUNTER CARD CLOSE ON ESC
---------------------------------------------------- */

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){

const el=document.getElementById("encounter")

if(el) el.style.display="none"

}

})



/* ----------------------------------------------------
PREVENT DOUBLE ENCOUNTER TRIGGER
---------------------------------------------------- */

let lastEncounterTime=0

function safeOpenEncounter(site){

const now=Date.now()

if(now-lastEncounterTime<5000) return

lastEncounterTime=now

openEncounter(site)

}



/* ----------------------------------------------------
PATCH MARKER CLICK
---------------------------------------------------- */

markers.forEach(m=>{

m.getElement().onclick=()=>safeOpenEncounter(m.site)

})
</script>
