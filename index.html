<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#fff7ec;
}

/* MAP */

#map{
width:100%;
height:100vh;
}

/* HOME */

#home-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2fa3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
color:white;
text-align:center;
}

.home-title{
font-size:56px;
font-weight:800;
}

/* SEARCH PANEL */

#search-panel{
position:absolute;
top:16px;
right:16px;
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 4px 16px rgba(0,0,0,0.2);
z-index:5;
width:300px;
display:flex;
flex-direction:column;
gap:8px;
}

/* NAV */

#nav{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 14px;
border-radius:20px;
box-shadow:0 4px 16px rgba(0,0,0,.2);
z-index:5;
}

#nav button{
border:none;
background:none;
margin:0 6px;
font-weight:600;
cursor:pointer;
}

/* ENCOUNTER CARD */

#encounter{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:min(92vw,340px);

background:#fff7ec;
border:5px solid #ff2fa3;
border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

padding:14px;
display:none;
z-index:10;

}

.card-title{
font-size:20px;
font-weight:800;
color:#2b7cff;
}

.card-image{
position:relative;
margin-top:6px;
}

.card-image img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
}

/* REMOVE PHOTO BUTTON */

.photo-remove{
position:absolute;
top:6px;
right:6px;
background:#ff2fa3;
color:white;
border-radius:50%;
width:24px;
height:24px;
text-align:center;
line-height:24px;
font-weight:700;
cursor:pointer;
display:none;
}

/* BADGES */

.badge{
display:inline-block;
padding:4px 8px;
border-radius:8px;
font-size:12px;
font-weight:700;
margin-top:4px;
}

.discovery-Landmark{background:#2b7cff;color:white;}
.discovery-Notable{background:#7a3cff;color:white;}
.discovery-HiddenGem{background:#ff2fa3;color:white;}
.discovery-Secret{background:#f5b400;color:black;}

textarea{
width:100%;
margin-top:8px;
padding:8px;
border-radius:10px;
border:1px solid #ddd;
}

.card-actions{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.collect-btn{
background:#2b7cff;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
}

.close-btn{
background:#eee;
border:none;
padding:8px 12px;
border-radius:10px;
}

/* COLLECTION PAGE */

#collection-page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:30;
display:none;
overflow:auto;
padding:20px;
}

.collection-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:16px;
}

.collection-card{
background:#fff7ec;
border:3px solid #ff2fa3;
border-radius:14px;
padding:10px;
}

.collection-card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.collection-card h3{
color:#2b7cff;
}

@media(max-width:600px){

#search-panel{
width:90%;
right:5%;
}

}

</style>
</head>

<body>

<div id="home-screen">
<div class="home-title">Hot Girl Walk</div>
<div>Turn everyday routes into cultural discovery</div>
<br>
<button onclick="startApp()">Start Walk</button>
</div>

<div id="search-panel">
<div id="start-search"></div>
<button id="gps-btn">Use my GPS</button>
<div id="dest-search"></div>
<button id="route-button">Generate Route</button>
</div>

<div id="nav">
<button onclick="previewJourney()">Preview</button>
<button onclick="openCollection()">Collection</button>
<button onclick="shareJourney()">Share</button>
</div>

<div id="map"></div>

<!-- ENCOUNTER CARD -->

<div id="encounter">

<div class="card-title" id="encounter-title"></div>

<div id="type-badge" class="badge"></div>
<div id="discovery-badge" class="badge"></div>

<div class="card-image">

<img id="encounter-photo">

<div class="photo-remove" id="remove-photo">×</div>

</div>

<input type="file" id="photo-input" accept="image/*" capture="environment">

<textarea id="note" placeholder="Write reflection..."></textarea>

<div class="card-actions">

<button class="collect-btn" onclick="saveEncounter()">Collect</button>
<button class="close-btn" onclick="closeEncounter()">Close</button>

</div>

</div>

<!-- COLLECTION -->

<div id="collection-page">

<h1>Your Cultural Collection</h1>

<div id="collection-container"></div>

<br>
<button onclick="closeCollection()">Back to Map</button>

</div>

<script>

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"
const API_URL="https://script.google.com/macros/s/AKfycby74t0PVXTdY3Bk74si4hR9d0fy6MOo7bu2prje8sDRfE81jm_qlr4rzeU6dch8vipp/exec"

let map
let routeCoords=null
let markers=[]
let currentEncounter=null
let uploadedPhotoBase64=null

let startCoords=null
let destinationCoords=null

let USER_ID=localStorage.getItem("hg_user")

if(!USER_ID){
USER_ID=crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)
}

/* START APP */

function startApp(){
document.getElementById("home-screen").style.display="none"
initMap()
}

/* MAP */

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

map.on("load",()=>{

startGPS()
initSearch()

})

}

/* GPS */

function startGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

startCoords=[pos.coords.longitude,pos.coords.latitude]

map.flyTo({center:startCoords,zoom:14})

})

}

/* SEARCH */

function initSearch(){

const startGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Start location"
})

document.getElementById("start-search").appendChild(startGeo.onAdd(map))

startGeo.on("result",e=>{
startCoords=e.result.center
})

const destGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Destination"
})

document.getElementById("dest-search").appendChild(destGeo.onAdd(map))

destGeo.on("result",e=>{
destinationCoords=e.result.center
})

document.getElementById("route-button").onclick=generateRoute

}

/* ROUTE */

async function generateRoute(){

if(!startCoords||!destinationCoords) return

const url=
API_URL+
"?action=routeFromCoords"+
"&lat="+startCoords[1]+
"&lng="+startCoords[0]+
"&destLng="+destinationCoords[0]+
"&destLat="+destinationCoords[1]

const res=await fetch(url)
const data=await res.json()

routeCoords=data.geometry.coordinates

drawRoute(routeCoords)

loadEncounters(routeCoords)

}

/* DRAW ROUTE */

function drawRoute(coords){

const geojson={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
}]
}

if(map.getSource("route")){
map.getSource("route").setData(geojson)
}else{

map.addSource("route",{type:"geojson",data:geojson})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

}

/* TYPE + DISCOVERY SYSTEM */

function getType(tags){

if(tags.tourism==="museum") return "Museum"
if(tags.tourism==="artwork") return "Artwork"
if(tags.historic) return "Historic"

return "Culture"

}

function getDiscovery(distance){

if(distance<0.05) return "Landmark"
if(distance<0.1) return "Notable"
if(distance<0.2) return "HiddenGem"

return "Secret"

}

/* LOAD ENCOUNTERS */

async function loadEncounters(coords){

markers.forEach(m=>m.remove())
markers=[]

const line=turf.lineString(coords)
const bbox=turf.bbox(line)

const query=`
[out:json];
(
node["tourism"="museum"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["historic"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
);
out center;
`

const res=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:query})
const data=await res.json()

if(!data.elements) return

const candidates=[]

data.elements.forEach(el=>{

if(!el.tags || !el.tags.name) return

const coords=[el.lon||el.center.lon,el.lat||el.center.lat]

const point=turf.point(coords)

const dist=turf.pointToLineDistance(point,line,{units:"kilometers"})

if(dist>0.25) return

const type=getType(el.tags)
const discovery=getDiscovery(dist)

candidates.push({
name:el.tags.name,
coords:coords,
type:type,
discovery:discovery
})

})

const step=Math.floor(candidates.length/4)

for(let i=0;i<4;i++){

const index=i*step

const site=candidates[index]

if(!site) continue

const marker=new mapboxgl.Marker({color:"#ff2fa3"})
.setLngLat(site.coords)
.addTo(map)

marker.site=site

marker.getElement().onclick=()=>openEncounter(site)

markers.push(marker)

}

}

/* PREVIEW */

async function previewJourney(){

if(!markers.length) return

for(const m of markers){

map.flyTo({center:m.site.coords,zoom:17})

await sleep(2000)

openEncounter(m.site)

await sleep(2500)

closeEncounter()

}

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

/* OPEN CARD */

function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

document.getElementById("type-badge").innerText=site.type

document.getElementById("discovery-badge").innerText=site.discovery
document.getElementById("discovery-badge").className="badge discovery-"+site.discovery

document.getElementById("encounter-photo").src=
"https://picsum.photos/400/250?random="+Math.random()

document.getElementById("encounter").style.display="block"

}

/* CLOSE */

function closeEncounter(){
document.getElementById("encounter").style.display="none"
}

/* PHOTO UPLOAD */

document.getElementById("photo-input").addEventListener("change",function(e){

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(evt){

uploadedPhotoBase64=evt.target.result.split(",")[1]

document.getElementById("encounter-photo").src=evt.target.result

document.getElementById("remove-photo").style.display="block"

}

reader.readAsDataURL(file)

})

document.getElementById("remove-photo").onclick=function(){

uploadedPhotoBase64=null

document.getElementById("encounter-photo").src=
"https://picsum.photos/400/250?random="+Math.random()

this.style.display="none"

}

/* SAVE */

function saveEncounter(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

action:"encounter",

user_id:USER_ID,
site_name:currentEncounter.name,

lat:currentEncounter.coords[1],
lng:currentEncounter.coords[0],

note:document.getElementById("note").value,

photo:uploadedPhotoBase64

})
})

closeEncounter()

}

/* SHARE */

async function shareJourney(){

const card=document.getElementById("encounter")

const canvas=await html2canvas(card,{backgroundColor:"#fff7ec"})

canvas.toBlob(blob=>{

const link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="encounter-card.png"
link.click()

})

}

/* COLLECTION */

async function openCollection(){

document.getElementById("collection-page").style.display="block"

const container=document.getElementById("collection-container")

const res=await fetch(API_URL+"?action=encounters")
const data=await res.json()

container.innerHTML=""

const grid=document.createElement("div")
grid.className="collection-grid"

data.forEach(card=>{

const div=document.createElement("div")

div.className="collection-card"

div.innerHTML=`

<img src="${card.photo || 'https://picsum.photos/300/200?random='+Math.random()}">

<h3>${card.site_name}</h3>

<p>${card.note||""}</p>

`

grid.appendChild(div)

})

container.appendChild(grid)

}

function closeCollection(){
document.getElementById("collection-page").style.display="none"
}

</script>
</body>
</html>
