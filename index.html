<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cultural Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
}

#map {
  width:100%;
  height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

// MAPBOX TOKEN
mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN_HERE';

// Create map centred on London
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-0.1276, 51.5072],
    zoom: 12
});


// Distance calculator (Haversine formula)
function getDistance(lat1, lon1, lat2, lon2) {

    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;

    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}



// Load Google Sheet data
fetch("https://script.google.com/macros/s/AKfycbzvBuo6pFVBbMO2JWD-YEHtftkvl5DsmCZPTRkwLLxMezVwKOlWxc0OIL1vXphQZWa0/exec")

.then(res => res.json())

.then(data => {

    const culturalPlaces = data.filter(p => p.type === "culture");
    const mainPlaces = data.filter(p => p.type === "main");



    mainPlaces.forEach(main => {

        // BIG main marker
        new mapboxgl.Marker({color:"red"})
            .setLngLat([main.lng, main.lat])
            .setPopup(new mapboxgl.Popup().setHTML(`<h3>${main.name}</h3>`))
            .addTo(map);



        culturalPlaces.forEach(place => {

            const dist = getDistance(main.lat, main.lng, place.lat, place.lng);

            // only show within 500m
            if(dist <= 500){

                // cultural marker
                new mapboxgl.Marker({color:"blue"})
                    .setLngLat([place.lng, place.lat])
                    .setPopup(
                        new mapboxgl.Popup().setHTML(
                            `<b>${place.name}</b><br>${Math.round(dist)}m away`
                        )
                    )
                    .addTo(map);


                // connection line
                map.addLayer({
                    id: main.name + "-" + place.name,
                    type: "line",
                    source: {
                        type: "geojson",
                        data: {
                            type: "Feature",
                            geometry: {
                                type: "LineString",
                                coordinates: [
                                    [main.lng, main.lat],
                                    [place.lng, place.lat]
                                ]
                            }
                        }
                    },
                    paint: {
                        "line-color": "#888",
                        "line-width": 2
                    }
                });

            }

        });

    });

})

.catch(err => console.error(err));

</script>

</body>
</html>
