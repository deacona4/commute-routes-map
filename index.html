<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link
href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"
rel="stylesheet"
/>

<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
}

#map{
width:100%;
height:100vh;
}

/* HOME SCREEN */

#home-screen{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:#ff2fa3;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:20;

}

.home-title{

font-size:64px;
font-weight:800;
color:white;

}

.home-sub{

color:white;
margin-top:10px;

}

.home-search{

width:320px;
margin-top:20px;

}

.home-buttons{

margin-top:20px;

}

.home-buttons button{

padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:#ff2fa3;
font-weight:700;
cursor:pointer;

}

/* NAV */

#top-nav{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:6px 12px;
border-radius:20px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
z-index:3;
}

#top-nav button{
border:none;
background:none;
margin:0 6px;
font-weight:600;
cursor:pointer;
}

/* JOURNEY PANEL */

#journey-panel{

position:absolute;
top:80px;
left:20px;

width:260px;

background:white;

padding:14px;

border-radius:12px;

box-shadow:0 6px 16px rgba(0,0,0,0.2);

z-index:3;

display:none;

}

/* WALK CONTROLS */

#walk-controls{

position:absolute;
bottom:20px;
left:50%;

transform:translateX(-50%);

display:none;

gap:6px;

z-index:3;

}

#walk-controls button{

padding:8px 14px;

border:none;

border-radius:8px;

background:#ff2fa3;

color:white;

cursor:pointer;

}

/* MARKERS */

.marker-number{

display:flex;

align-items:center;

justify-content:center;

width:28px;

height:28px;

background:#e63946;

border:3px solid white;

border-radius:50%;

color:white;

font-weight:600;

}

</style>

</head>

<body>

<!-- HOME SCREEN -->

<div id="home-screen">

<div class="home-title">Hot Girl Walk</div>

<div class="home-sub">
Turn your everyday walk into cultural discovery
</div>

<div id="destination-search" class="home-search"></div>

<div class="home-buttons">

<button onclick="startFromHere()">Start Walk From Here</button>

</div>

</div>

<!-- NAV -->

<div id="top-nav">

<button onclick="previewJourney()">Preview</button>

<button onclick="startWalk()">Start Walk</button>

<button onclick="toggleMemories()">Memories</button>

</div>

<!-- JOURNEY PANEL -->

<div id="journey-panel">

<b>Your Hot Girl Walk</b><br>

Encounters will appear here.

</div>

<!-- WALK CONTROLS -->

<div id="walk-controls">

<button onclick="pauseWalk()">Pause</button>

<button onclick="resumeWalk()">Resume</button>

<button onclick="endWalk()">End</button>

</div>

<!-- ENCOUNTER CARD -->

<div id="encounter" style="

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:320px;

background:white;

padding:16px;

border-radius:16px;

box-shadow:0 20px 40px rgba(0,0,0,.4);

display:none;

z-index:10;

">

<img id="encounter-photo" style="width:100%;height:160px;object-fit:cover;border-radius:8px;">

<h3 id="encounter-title"></h3>

<p id="prompt" style="font-style:italic;color:#666;"></p>

<textarea id="note" placeholder="Write reflection..." style="width:100%;margin-top:10px;"></textarea>

<input type="file" id="photo">

<br><br>

<button onclick="saveEncounter()">Save</button>

<button onclick="shareEncounter()">Share</button>

<button onclick="closeEncounter()">Close</button>

</div>

<!-- SHARE CARD -->

<div id="share-card" style="display:none;width:420px;background:white;padding:20px;border-radius:16px;">

<img id="share-image" style="width:100%;height:240px;object-fit:cover;">

<h2 id="share-title"></h2>

<p id="share-note"></p>

<p style="font-size:12px;color:#777;">
Hot Girl Walk
</p>

</div>

<div id="map"></div>

<script>

/* CONFIG */

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbwoR7AKONVu4T_p9JatJAm2Ag8TjOkOIiT0H_aBmcBtWpPlyR-e1EP7PymozqorgKww/exec"

/* STATE */

let map

let routeCoords=null

let markers=[]

let archiveMarkers=[]

let siteCache=new Map()

let wikiCache=new Map()

let watchId=null

let walkActive=false

let lastPosition=null

let userMarker=null

let destinationCoords=null

/* USER ID */

let USER_ID = localStorage.getItem("hg_user")

if(!USER_ID){

USER_ID = crypto.randomUUID()

localStorage.setItem("hg_user",USER_ID)

}

/* MAP INIT */

function initMap(){

map=new mapboxgl.Map({

container:"map",

style:"mapbox://styles/mapbox/streets-v12",

center:[-0.1276,51.5072],

zoom:12

})

map.addControl(new mapboxgl.NavigationControl())

initDestinationSearch()

loadEncounterArchive()

}

/* DESTINATION SEARCH */

function initDestinationSearch(){

const geocoder = new MapboxGeocoder({

accessToken: mapboxgl.accessToken,

mapboxgl: mapboxgl,

placeholder: "Where are you walking to?",

marker:false

})

document.getElementById("destination-search")
.appendChild(geocoder.onAdd(map))

geocoder.on("result", e => {

destinationCoords = e.result.center

})

}

/* START WALK FROM HERE */

function startFromHere(){

if(!destinationCoords){

alert("Choose destination")

return

}

document.getElementById("home-screen").style.display="none"

initMap()

routeFromHere()

}
/* ----------------------------------------------------
ROUTE FROM GPS
---------------------------------------------------- */

async function routeFromHere(){

navigator.geolocation.getCurrentPosition(async pos=>{

const startLat=pos.coords.latitude
const startLng=pos.coords.longitude

const destLng=destinationCoords[0]
const destLat=destinationCoords[1]

const res=await fetch(
API_URL+
"?action=routeFromCoords"+
"&lat="+startLat+
"&lng="+startLng+
"&destLng="+destLng+
"&destLat="+destLat
)

const data=await res.json()

routeCoords=data.geometry.coordinates

drawRoute(routeCoords)

await loadEncounters(routeCoords)

zoomToRoute()

})

}


/* ----------------------------------------------------
DRAW ROUTE
---------------------------------------------------- */

function drawRoute(coords){

const geojson={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{
type:"LineString",
coordinates:coords
}
}]
}

if(map.getSource("route")){

map.getSource("route").setData(geojson)

}else{

map.addSource("route",{type:"geojson",data:geojson})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

}


/* ----------------------------------------------------
ZOOM MAP TO ROUTE
---------------------------------------------------- */

function zoomToRoute(){

const bounds=turf.bbox(turf.lineString(routeCoords))

map.fitBounds(bounds,{
padding:60
})

}


/* ----------------------------------------------------
ROUTE PREVIEW
---------------------------------------------------- */

async function previewJourney(){

if(!routeCoords) return

const stops=[

routeCoords[0],

...markers.map(m=>m.getLngLat().toArray()),

routeCoords[routeCoords.length-1]

]

for(const point of stops){

map.flyTo({
center:point,
zoom:16,
pitch:50,
bearing:map.getBearing()+30,
duration:2500
})

await new Promise(r=>setTimeout(r,2200))

}

}


/* ----------------------------------------------------
ADVANCED CULTURAL DISCOVERY (OVERPASS)
---------------------------------------------------- */

async function fetchCulturalSites(coords){

const key=coords.slice(0,40).join("|")

if(siteCache.has(key)) return siteCache.get(key)

const line=turf.lineString(coords)

const bbox=turf.bbox(line)

const query=`

[out:json];

(

node["tourism"~"museum|gallery"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["historic"~"monument|memorial|building"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["artwork_type"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["historic"="plaque"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["amenity"="arts_centre"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["amenity"="theatre"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["tourism"="attraction"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

);

out center;

`

const res=await fetch(
"https://overpass.kumi.systems/api/interpreter",
{
method:"POST",
body:query
}
)

const data=await res.json()

const sites=data.elements.map(el=>{

const lon=el.lon||el.center?.lon
const lat=el.lat||el.center?.lat

if(!lon||!lat) return null
if(!el.tags?.name) return null

return{

name:el.tags.name,
coords:[lon,lat],
tags:el.tags

}

}).filter(Boolean)

siteCache.set(key,sites)

return sites

}


/* ----------------------------------------------------
CORRIDOR FILTER
---------------------------------------------------- */

function filterSitesAlongRoute(sites,coords){

const line=turf.lineString(coords)

const corridor=turf.buffer(
line,
0.25,
{units:"kilometers"}
)

return sites.filter(site=>

turf.booleanPointInPolygon(
turf.point(site.coords),
corridor
)

)

}


/* ----------------------------------------------------
CULTURAL IMPORTANCE RANKING
---------------------------------------------------- */

function rankCulturalSites(sites,coords){

const line=turf.lineString(coords)

return sites

.map(site=>{

const dist=turf.pointToLineDistance(
turf.point(site.coords),
line,
{units:"kilometers"}
)

let importance=1

if(site.tags?.tourism==="museum") importance=3
if(site.tags?.tourism==="gallery") importance=2
if(site.tags?.historic) importance=2
if(site.tags?.tourism==="artwork") importance=2

return{
site:site,
score:(3-dist)+importance
}

})

.sort((a,b)=>b.score-a.score)

.map(s=>s.site)

}


/* ----------------------------------------------------
LOAD ENCOUNTERS
---------------------------------------------------- */

async function loadEncounters(coords){

markers.forEach(m=>m.remove())

markers=[]

const sites=await fetchCulturalSites(coords)

const filtered=filterSitesAlongRoute(sites,coords)

const ranked=rankCulturalSites(filtered,coords)

const selected=ranked.slice(0,4)

updateJourneyPanel(selected)

selected.forEach((site,i)=>{

const el=document.createElement("div")

el.className="marker-number"

el.innerText=i+1

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(map)

marker.site=site

marker.getElement().onclick=()=>openEncounter(site)

markers.push(marker)

})

document.getElementById("journey-panel").style.display="block"

}


/* ----------------------------------------------------
JOURNEY PANEL
---------------------------------------------------- */

function updateJourneyPanel(sites){

const panel=document.getElementById("journey-panel")

panel.innerHTML="<b>Your Hot Girl Walk</b><br><br>"

sites.forEach((site,i)=>{

const row=document.createElement("div")

row.style.padding="6px"
row.style.cursor="pointer"

row.innerHTML=i+1+". "+site.name

row.onclick=()=>{

map.flyTo({
center:site.coords,
zoom:16
})

openEncounter(site)

}

panel.appendChild(row)

})

}
/* ----------------------------------------------------
WALK NAVIGATION MODE
---------------------------------------------------- */

function startWalk(){

if(walkActive) return

walkActive=true

watchId=navigator.geolocation.watchPosition(updateWalk)

document.getElementById("walk-controls").style.display="flex"

}

function pauseWalk(){

if(!walkActive) return

navigator.geolocation.clearWatch(watchId)

walkActive=false

}

function resumeWalk(){

if(walkActive) return

watchId=navigator.geolocation.watchPosition(updateWalk)

walkActive=true

}

function endWalk(){

navigator.geolocation.clearWatch(watchId)

walkActive=false

document.getElementById("walk-controls").style.display="none"

map.easeTo({
pitch:0,
bearing:0,
zoom:14
})

}


/* ----------------------------------------------------
GPS UPDATE
---------------------------------------------------- */

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

let bearing=0

if(lastPosition){

bearing=turf.bearing(
turf.point(lastPosition),
turf.point(coords)
)

}

lastPosition=coords

map.easeTo({
center:coords,
zoom:17,
pitch:60,
bearing:bearing,
duration:800
})

checkNearbySites(coords)

}


/* ----------------------------------------------------
AUTO ENCOUNTER TRIGGER
---------------------------------------------------- */

function checkNearbySites(userCoords){

markers.forEach(marker=>{

const site=marker.site

const dist=turf.distance(
turf.point(userCoords),
turf.point(site.coords),
{units:"meters"}
)

if(dist<40){

openEncounter(site)

}

})

}


/* ----------------------------------------------------
WIKIPEDIA LOOKUP
---------------------------------------------------- */

async function fetchWiki(siteName){

if(!siteName) return null

if(wikiCache.has(siteName)) return wikiCache.get(siteName)

try{

const searchURL=`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(siteName)}&format=json&origin=*`

const searchRes=await fetch(searchURL)

const searchData=await searchRes.json()

if(!searchData.query.search.length){

wikiCache.set(siteName,null)

return null

}

const pageTitle=searchData.query.search[0].title

const summaryURL=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`

const summaryRes=await fetch(summaryURL)

if(!summaryRes.ok){

wikiCache.set(siteName,null)

return null

}

const summaryData=await summaryRes.json()

wikiCache.set(siteName,summaryData)

return summaryData

}catch(err){

wikiCache.set(siteName,null)

return null

}

}


/* ----------------------------------------------------
REFLECTION PROMPTS
---------------------------------------------------- */

async function fetchPrompt(){

const prompts=await fetch(API_URL+"?action=prompts").then(r=>r.json())

return prompts[
Math.floor(Math.random()*prompts.length)
]

}


/* ----------------------------------------------------
OPEN ENCOUNTER
---------------------------------------------------- */

let currentEncounter=null

async function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

const wiki=await fetchWiki(site.name)

if(wiki?.thumbnail){

document.getElementById("encounter-photo").src=wiki.thumbnail.source

}

const prompt=await fetchPrompt()

document.getElementById("prompt").innerText=prompt

document.getElementById("encounter").style.display="block"

}


/* ----------------------------------------------------
CLOSE ENCOUNTER
---------------------------------------------------- */

function closeEncounter(){

document.getElementById("encounter").style.display="none"

}


/* ----------------------------------------------------
PHOTO PREVIEW
---------------------------------------------------- */

const photoInput=document.getElementById("photo")

if(photoInput){

photoInput.addEventListener("change",(e)=>{

const file=e.target.files[0]

if(!file) return

document.getElementById("encounter-photo").src=URL.createObjectURL(file)

})

}


/* ----------------------------------------------------
SAVE ENCOUNTER
---------------------------------------------------- */

async function saveEncounter(){

if(!currentEncounter) return

let photoBase64=""

const file=document.getElementById("photo").files[0]

if(file){

photoBase64=await new Promise((resolve,reject)=>{

const reader=new FileReader()

reader.onload=()=>{

const result=String(reader.result||"")

resolve(result.split(",")[1]||"")

}

reader.onerror=reject

reader.readAsDataURL(file)

})

}

const payload={

action:"encounter",
user_id:USER_ID,
site_name:currentEncounter.name,
note:document.getElementById("note").value,
lat:currentEncounter.coords[1],
lng:currentEncounter.coords[0],
photo:photoBase64

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Encounter saved!")

buildShareCard()

closeEncounter()

}


/* ----------------------------------------------------
LOAD MEMORY MARKERS
---------------------------------------------------- */

async function loadEncounterArchive(){

const data=await fetch(API_URL+"?action=encounters").then(r=>r.json())

data.forEach(e=>{

if(!e.lng||!e.lat) return

const marker=new mapboxgl.Marker({color:"blue"})
.setLngLat([e.lng,e.lat])
.addTo(map)

archiveMarkers.push(marker)

})

}

async function toggleMemories(){

if(archiveMarkers.length){

archiveMarkers.forEach(m=>m.remove())

archiveMarkers=[]

return

}

loadEncounterArchive()

}


/* ----------------------------------------------------
SHARE CARD BUILDER
---------------------------------------------------- */

function buildShareCard(){

document.getElementById("share-image").src=
document.getElementById("encounter-photo").src

document.getElementById("share-title").innerText=
currentEncounter.name

document.getElementById("share-note").innerText=
document.getElementById("note").value

}


/* ----------------------------------------------------
SOCIAL SHARE
---------------------------------------------------- */

async function shareEncounter(){

const card=document.getElementById("share-card")

const canvas=await html2canvas(card)

canvas.toBlob(async blob=>{

const file=new File([blob],"hot-girl-walk.png",{type:"image/png"})

if(navigator.share){

await navigator.share({

title:"Hot Girl Walk",
text:"Look what I discovered on my walk ✨",
files:[file]

})

}else{

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="hot-girl-walk.png"

link.click()

}

})

}


/* ----------------------------------------------------
END OF HOT GIRL WALK APP
---------------------------------------------------- */

</script>

</body>

</html>
