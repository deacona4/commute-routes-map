<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#fff7ec;
overflow:hidden;
}

#map{
width:100%;
height:100vh;
}

/* HOME SCREEN */

#home-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2fa3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:100;
}

.home-title{
font-size:64px;
font-weight:800;
}

.start-button{
margin-top:20px;
padding:14px 24px;
border-radius:30px;
border:none;
background:white;
color:#ff2fa3;
font-weight:700;
cursor:pointer;
}

/* SEARCH PANEL */

#search-panel{
position:absolute;
top:20px;
right:20px;
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.25);
width:320px;
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

/* NAV */

#nav{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
border-radius:30px;
padding:10px 16px;
display:flex;
gap:10px;
box-shadow:0 4px 16px rgba(0,0,0,.25);
z-index:10;
}

#nav button{
border:none;
background:none;
font-weight:600;
cursor:pointer;
}

/* WALK INDICATOR */

.walk-indicator{
position:absolute;
top:14px;
left:14px;
background:#2b7cff;
color:white;
padding:6px 10px;
border-radius:12px;
display:none;
z-index:20;
}

/* ENCOUNTER CARD */

#encounter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:360px;
background:#fff7ec;
border:5px solid #ff2fa3;
border-radius:16px;
padding:16px;
display:none;
z-index:50;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

#encounter img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.badge{
font-size:12px;
font-weight:700;
color:#ff2fa3;
}

.close-btn{
margin-top:10px;
border:none;
padding:8px 12px;
background:#ff2fa3;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="walk-indicator" class="walk-indicator">
Walking Mode
</div>

<div id="home-screen">

<div class="home-title">
Hot Girl Walk
</div>

<button class="start-button" onclick="startApp()">
Start Walk
</button>

</div>

<div id="search-panel">

<div id="start-search"></div>

<button id="gps-btn">
Use my GPS
</button>

<div id="dest-search"></div>

<button id="route-button">
Generate Route
</button>

</div>

<div id="nav">

<button id="preview-btn">Preview</button>
<button id="walk-btn">Start Walk</button>
<button id="stop-btn">End Walk</button>

</div>

<div id="map"></div>

<div id="encounter">

<h2 id="encounter-title"></h2>

<div id="encounter-badge" class="badge"></div>

<img id="encounter-image">

<p id="encounter-description"></p>

<button class="close-btn" onclick="closeEncounter()">
Close
</button>

</div>

<script>
/************************************************
CONFIG
************************************************/

const API_URL =
"https://script.google.com/macros/s/AKfycbzVLNGZORvNbCTllMP8stvsNycM9itkDpqMLsDFEY783Gmx4G-I11OIR_P3SccOXImM/exec"

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

/************************************************
GLOBAL STATE
************************************************/

const STATE = {

map:null,

startCoords:null,
destinationCoords:null,

routeCoords:null,
routeId:null,

encounters:[],
markers:[],

userMarker:null,
walkWatcher:null,

walkStartTime:null,

prompts:[],
cultureTypes:[]

}

/************************************************
UTILITIES
************************************************/

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms))
}

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function distanceMeters(a,b){

return turf.distance(
turf.point(a),
turf.point(b),
{units:"meters"}
)

}

/************************************************
API HELPERS
************************************************/

async function apiGet(params){

const query = new URLSearchParams(params).toString()

const res = await fetch(API_URL + "?" + query)

return await res.json()

}

async function apiPost(data){

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

return await res.json()

}

/************************************************
APP START
************************************************/

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

loadPrompts()

loadCultureTypes()

}

/************************************************
LOAD PROMPTS
************************************************/

async function loadPrompts(){

try{

STATE.prompts = await apiGet({action:"prompts"})

}catch(err){

console.warn("prompts load failed")

}

}

/************************************************
LOAD CULTURE TYPES
************************************************/

async function loadCultureTypes(){

try{

STATE.cultureTypes = await apiGet({action:"cultureTypes"})

}catch(err){

console.warn("culture types load failed")

}

}

/************************************************
BUTTON INITIALIZATION
************************************************/

function initButtons(){

document.getElementById("gps-btn").onclick = requestGPS

document.getElementById("route-button").onclick = generateRoute

document.getElementById("preview-btn").onclick = previewJourney

document.getElementById("walk-btn").onclick = startWalk

document.getElementById("stop-btn").onclick = stopWalk

}

/************************************************
CLEAR MARKERS
************************************************/

function clearMarkers(){

STATE.markers.forEach(marker=>marker.remove())

STATE.markers=[]

}

/************************************************
MAP INITIALIZATION
************************************************/

function initMap(){

STATE.map = new mapboxgl.Map({

container:"map",

style:"mapbox://styles/mapbox/streets-v12",

center:[-0.1276,51.5072],

zoom:12,

pitch:40

})

STATE.map.addControl(new mapboxgl.NavigationControl())

STATE.map.on("load",()=>{

initSearch()

initButtons()

})

}
/************************************************
SEARCH SYSTEM
************************************************/

function initSearch(){

const londonBounds = [
-0.563,51.261,
0.280,51.686
]

const startGeocoder = new MapboxGeocoder({
accessToken: mapboxgl.accessToken,
mapboxgl: mapboxgl,
placeholder:"Start location",
countries:"gb",
bbox:londonBounds,
marker:false
})

document
.getElementById("start-search")
.appendChild(startGeocoder.onAdd(STATE.map))

startGeocoder.on("result",e=>{
STATE.startCoords = e.result.center
})

const destGeocoder = new MapboxGeocoder({
accessToken: mapboxgl.accessToken,
mapboxgl: mapboxgl,
placeholder:"Destination",
countries:"gb",
bbox:londonBounds,
marker:false
})

document
.getElementById("dest-search")
.appendChild(destGeocoder.onAdd(STATE.map))

destGeocoder.on("result",e=>{
STATE.destinationCoords = e.result.center
})

}
/************************************************
ROUTE GENERATION
************************************************/

async function generateRoute(){

if(!STATE.startCoords || !STATE.destinationCoords){

alert("Choose start and destination")

return

}

try{

const route = await apiGet({

action:"routeFromCoords",
lng:STATE.startCoords[0],
lat:STATE.startCoords[1],
destLng:STATE.destinationCoords[0],
destLat:STATE.destinationCoords[1]

})

STATE.routeCoords = route.geometry.coordinates
STATE.routeId = route.properties.route_id || null

drawRoute(STATE.routeCoords)

fitCameraToRoute(STATE.routeCoords)

await loadEncounters()

}catch(err){

console.error(err)
alert("Route generation failed")

}

}

/************************************************
DRAW ROUTE
************************************************/

function drawRoute(coords){

const geojson={
type:"Feature",
geometry:{
type:"LineString",
coordinates:coords
}
}

if(STATE.map.getSource("route")){
STATE.map.getSource("route").setData(geojson)
}else{

STATE.map.addSource("route",{type:"geojson",data:geojson})

STATE.map.addLayer({
id:"route-line",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

}
/************************************************
DISCOVERY ENGINE
************************************************/

function sampleRoutePoints(){

const line = turf.lineString(STATE.routeCoords)

const length = turf.length(line,{units:"kilometers"})

const checkpoints=[0.2,0.4,0.6,0.8]

return checkpoints.map(p=>{
const pt=turf.along(line,length*p,{units:"kilometers"})
return pt.geometry.coordinates
})

}

async function loadEncounters(){

clearMarkers()

STATE.encounters=[]

const points=sampleRoutePoints()

for(const p of points){

const site = await fetchNearbyCulturalSite(p)

if(site){
STATE.encounters.push(site)
}

}

renderEncounterMarkers()

}

/************************************************
OVERPASS FETCH
************************************************/

async function fetchNearbyCulturalSite(coord){

const lat=coord[1]
const lng=coord[0]

const query=`
[out:json];
(
node(around:200,${lat},${lng})["tourism"="museum"];
node(around:200,${lat},${lng})["tourism"="artwork"];
node(around:200,${lat},${lng})["historic"];
);
out;
`

const url="https://overpass-api.de/api/interpreter"

const res=await fetch(url,{method:"POST",body:query})

const data=await res.json()

if(!data.elements || !data.elements.length) return null

const el=data.elements[0]

return {
name:el.tags.name || "Cultural Site",
coords:[el.lon,el.lat],
badge:rankDiscovery(el),
description:"",
image:null
}

}
/************************************************
ENCOUNTER MARKERS
************************************************/

function renderEncounterMarkers(){

STATE.encounters.forEach(site=>{

const el=document.createElement("div")

el.style.width="18px"
el.style.height="18px"
el.style.background="#ff2fa3"
el.style.borderRadius="50%"
el.style.border="3px solid white"
el.style.cursor="pointer"

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(STATE.map)

el.onclick=()=>openEncounter(site)

STATE.markers.push(marker)

})

}

function rankDiscovery(site){

if(site.tags?.tourism==="museum") return "Landmark"
if(site.tags?.tourism==="artwork") return "Hidden Gem"
if(site.tags?.historic) return "Historic"

return "Discovery"

}
/************************************************
ENCOUNTER CARD
************************************************/

function openEncounter(site){

document.getElementById("encounter-title").innerText=site.name

document.getElementById("encounter-badge").innerText=site.badge

document.getElementById("encounter-description").innerText=
site.description || randomItem(STATE.prompts)

if(site.image){

document.getElementById("encounter-image").src=site.image

}else{

document.getElementById("encounter-image").style.display="none"

}

document.getElementById("encounter").style.display="block"

}

function closeEncounter(){

document.getElementById("encounter").style.display="none"

}
/************************************************
WALK MODE
************************************************/

function startWalk(){

STATE.walkStartTime=new Date()

document.getElementById("walk-indicator").style.display="block"

STATE.walkWatcher=navigator.geolocation.watchPosition(updateUserPosition)

}

function stopWalk(){

navigator.geolocation.clearWatch(STATE.walkWatcher)

document.getElementById("walk-indicator").style.display="none"

saveWalk()

}

function updateUserPosition(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!STATE.userMarker){

STATE.userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(STATE.map)

}else{

STATE.userMarker.setLngLat(coords)

}

STATE.map.easeTo({
center:coords,
zoom:16
})

}

/************************************************
SAVE WALK
************************************************/

async function saveWalk(){

await apiPost({
action:"walk",
user_id:"guest",
route_id:STATE.routeId,
start_time:STATE.walkStartTime,
end_time:new Date()
})

}
/************************************************
LOAD COLLECTION
************************************************/

async function loadCollection(){

const encounters = await apiGet({action:"encounters"})

console.log("collection",encounters)

}

/************************************************
SHARE ENCOUNTER
************************************************/

async function shareEncounter(){

const card=document.getElementById("encounter")

const canvas=await html2canvas(card)

canvas.toBlob(async blob=>{

const file=new File([blob],"discovery.png",{type:"image/png"})

if(navigator.share){

await navigator.share({
files:[file],
title:"Hot Girl Walk Discovery"
})

}

})

}
/************************************************
CINEMATIC ROUTE PREVIEW + STORY GENERATOR
************************************************/

async function previewJourney(){

if(!STATE.routeCoords){

alert("Generate a route first")

return

}

closeEncounter()

const coords = STATE.routeCoords

/* start camera */

STATE.map.flyTo({
center:coords[0],
zoom:16,
pitch:60,
bearing:0,
duration:1200
})

await sleep(1200)

/* animate route */

await animateRouteCamera(coords)

/* return to start */

STATE.map.flyTo({
center:coords[0],
zoom:15,
pitch:45,
duration:1200
})

/* create shareable story */

generateRouteStory()

}

/************************************************
CAMERA ANIMATION
************************************************/

async function animateRouteCamera(coords){

const total = coords.length

const step = Math.max(1,Math.floor(total/60))

for(let i=0;i<total;i+=step){

const coord = coords[i]

STATE.map.easeTo({
center:coord,
duration:300,
pitch:60
})

flashEncounterNear(coord)

await sleep(300)

}

}

/************************************************
ENCOUNTER FLASH
************************************************/

function flashEncounterNear(coord){

STATE.encounters.forEach(site=>{

const dist = distanceMeters(coord,site.coords)

if(dist < 80){

const marker = STATE.markers.find(m=>{

const p = m.getLngLat()

return Math.abs(p.lng-site.coords[0])<0.0001
})

if(marker){

const el = marker.getElement()

el.style.transform="scale(1.6)"

setTimeout(()=>{
el.style.transform="scale(1)"
},600)

}

}

})

}

/************************************************
CINEMATIC ROUTE PREVIEW ENGINE
************************************************/

async function previewJourney(){

if(!STATE.routeCoords){
alert("Generate a route first")
return
}

closeEncounter()

const route = STATE.routeCoords

/* move camera to start */

STATE.map.flyTo({
center:route[0],
zoom:16,
pitch:65,
bearing:0,
duration:1500
})

await sleep(1500)

/* run cinematic flythrough */

await cinematicFlythrough(route)

/* return camera */

STATE.map.flyTo({
center:route[0],
zoom:15,
pitch:45,
duration:1200
})

/* generate share story */

generateRouteStory()

}

/************************************************
SMOOTH ROUTE FLYTHROUGH
************************************************/

async function cinematicFlythrough(route){

const line = turf.lineString(route)

const length = turf.length(line,{units:"kilometers"})

const steps = 120

for(let i=0;i<=steps;i++){

const dist = (length/steps)*i

const pt = turf.along(line,dist,{units:"kilometers"})

const coord = pt.geometry.coordinates

const nextDist = dist + (length/steps)
const nextPt = turf.along(line,nextDist,{units:"kilometers"})
const nextCoord = nextPt.geometry.coordinates

/* calculate bearing */

const bearing = turf.bearing(
turf.point(coord),
turf.point(nextCoord)
)

STATE.map.easeTo({
center:coord,
bearing:bearing,
pitch:65,
duration:250
})

pulseEncounterIfNearby(coord)

await sleep(250)

}

}

/************************************************
ENCOUNTER HIGHLIGHT
************************************************/

function pulseEncounterIfNearby(coord){

STATE.encounters.forEach(site=>{

const dist = distanceMeters(coord,site.coords)

if(dist < 80){

const marker = STATE.markers.find(m=>{
const p = m.getLngLat()
return Math.abs(p.lng-site.coords[0])<0.0001
})

if(marker){

const el = marker.getElement()

el.style.transform="scale(1.8)"

setTimeout(()=>{
el.style.transform="scale(1)"
},700)

}

}

})

}

/************************************************
VERTICAL STORY GENERATOR
************************************************/

async function generateRouteStory(){

const canvas = document.createElement("canvas")
canvas.width = 1080
canvas.height = 1920

const ctx = canvas.getContext("2d")

/* background */

ctx.fillStyle="#fff7ec"
ctx.fillRect(0,0,1080,1920)

/* title */

ctx.fillStyle="#ff2fa3"
ctx.font="bold 80px Inter"
ctx.fillText("Hot Girl Walk",180,200)

ctx.fillStyle="#333"
ctx.font="40px Inter"
ctx.fillText("My cultural discoveries",200,300)

/* capture map */

const mapCanvas = STATE.map.getCanvas()

ctx.drawImage(mapCanvas,90,420,900,900)

/* encounter list */

ctx.fillStyle="#ff2fa3"
ctx.font="36px Inter"

let y = 1400

STATE.encounters.forEach(site=>{
ctx.fillText("• "+site.name,140,y)
y+=60
})

/* export */

canvas.toBlob(async blob=>{

const file = new File([blob],"hot-girl-walk-story.png",{type:"image/png"})

if(navigator.share){

await navigator.share({
files:[file],
title:"Hot Girl Walk",
text:"My cultural walk"
})

}else{

const url = URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "hot-girl-walk-story.png"
a.click()

}

})

}

}
</script>
</body>
</html>
