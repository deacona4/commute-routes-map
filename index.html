<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
}

#map{
width:100%;
height:100vh;
}

#home-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2fa3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
color:white;
}

.home-title{
font-size:64px;
font-weight:800;
}

#search-panel{
position:absolute;
top:20px;
right:20px;
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 4px 16px rgba(0,0,0,0.2);
z-index:5;
width:320px;
display:flex;
flex-direction:column;
gap:8px;
}

#nav{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 14px;
border-radius:20px;
box-shadow:0 4px 16px rgba(0,0,0,.2);
z-index:5;
}

#nav button{
border:none;
background:none;
margin:0 6px;
font-weight:600;
cursor:pointer;
}

#encounter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
display:none;
z-index:10;
}

#encounter img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

textarea{
width:100%;
margin-top:10px;
}

#collection-page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:30;
display:none;
overflow:auto;
padding:20px;
}

#collection-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:16px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="home-screen">
<div class="home-title">Hot Girl Walk</div>
<div>Turn everyday routes into cultural discovery</div>
<br>
<button onclick="startApp()">Start Walk</button>
</div>

<div id="search-panel">
<div id="start-search"></div>
<button id="gps-btn">Use my GPS</button>
<div id="dest-search"></div>
<button id="route-button">Generate Route</button>
</div>

<div id="nav">
<button onclick="previewJourney()">Preview</button>
<button onclick="startWalk()">Start</button>
<button onclick="pauseWalk()">Pause</button>
<button onclick="resumeWalk()">Resume</button>
<button onclick="endWalk()">End</button>
<button onclick="toggleMemories()">Memories</button>
<button onclick="openCollection()">Collection</button>
<button onclick="shareJourney()">Share</button>
</div>

<div id="map"></div>

<div id="encounter">

<img id="encounter-photo">
<h3 id="encounter-title"></h3>

<div id="prompt">✨ Cultural Encounter</div>

<textarea id="note" placeholder="Write reflection..."></textarea>

<br><br>

<button onclick="saveEncounter()">Collect</button>
<button onclick="closeEncounter()">Close</button>

</div>

<div id="collection-page">

<h1>Your Cultural Collection</h1>

<div id="collection-grid"></div>

<br>
<button onclick="closeCollection()">Close</button>

</div>

<script>

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"
const API_URL="https://script.google.com/macros/s/AKfycbyaSu9_SytF-_iHGFSUd-p0T8mdeE3He3cXEWwq7_JxBTAfIMO-Ru6uwT-SWUBEfolY/exec"

let map
let routeCoords=null
let markers=[]
let archiveMarkers=[]

let destinationCoords=null
let startCoords=null

let userMarker=null
let watchId=null

let currentEncounter=null

let USER_ID=localStorage.getItem("hg_user")

if(!USER_ID){
USER_ID=crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)
}

function startApp(){
document.getElementById("home-screen").style.display="none"
initMap()
}

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

map.on("load",()=>{

startGPS()
initSearch()

})

}

function startGPS(){

navigator.geolocation.watchPosition(

pos=>{

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

startCoords=coords

})

}

document.getElementById("gps-btn").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

startCoords=[pos.coords.longitude,pos.coords.latitude]

map.flyTo({center:startCoords,zoom:14})

})

}

function initSearch(){

const startGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Start location"
})

document.getElementById("start-search")
.appendChild(startGeo.onAdd(map))

startGeo.on("result",e=>{
startCoords=e.result.center
})

const destGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Destination"
})

document.getElementById("dest-search")
.appendChild(destGeo.onAdd(map))

destGeo.on("result",e=>{
destinationCoords=e.result.center
})

document.getElementById("route-button").onclick=generateRoute

}

async function generateRoute(){

if(!startCoords||!destinationCoords) return

const url=
API_URL+
"?action=routeFromCoords"+
"&lat="+startCoords[1]+
"&lng="+startCoords[0]+
"&destLng="+destinationCoords[0]+
"&destLat="+destinationCoords[1]

const res=await fetch(url)
const data=await res.json()

routeCoords=data.geometry.coordinates

drawRoute(routeCoords)
zoomToRoute()
loadEncounters(routeCoords)

}

function drawRoute(coords){

const geojson={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
}]
}

if(map.getSource("route")){
map.getSource("route").setData(geojson)
}else{

map.addSource("route",{type:"geojson",data:geojson})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

}

function zoomToRoute(){

const bounds=turf.bbox(
turf.lineString(routeCoords)
)

map.fitBounds(bounds,{padding:60})

}

async function loadEncounters(coords){

markers.forEach(m=>m.remove())
markers=[]

const line=turf.lineString(coords)

const bbox=turf.bbox(line)

const query=`
[out:json];
(
node["tourism"="museum"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["historic"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
);
out center;
`

const res=await fetch(
"https://overpass-api.de/api/interpreter",
{method:"POST",body:query}
)

const data=await res.json()

const filtered=data.elements.filter(el=>el.tags&&el.tags.name)

filtered
.sort((a,b)=>{

const scoreA=(a.tags.tourism?3:0)+(a.tags.historic?2:0)
const scoreB=(b.tags.tourism?3:0)+(b.tags.historic?2:0)

return scoreB-scoreA

})
.slice(0,4)
.forEach(el=>{

const coords=[el.lon||el.center.lon,el.lat||el.center.lat]

const point=turf.point(coords)

const dist=turf.pointToLineDistance(point,line,{units:"kilometers"})

if(dist>0.2) return

const marker=new mapboxgl.Marker({color:"#ff2fa3"})
.setLngLat(coords)
.addTo(map)

marker.site={
name:el.tags.name,
coords:coords
}

marker.getElement().onclick=()=>openEncounter(marker.site)

markers.push(marker)

})

}

async function previewJourney(){

if(!routeCoords||markers.length==0) return

const start=routeCoords[0]

map.flyTo({center:start,zoom:15,pitch:45})

await sleep(2000)

for(const marker of markers){

map.flyTo({center:marker.site.coords,zoom:17,pitch:60})

await sleep(1500)

openEncounter(marker.site)

await sleep(2500)

closeEncounter()

}

map.flyTo({center:start,zoom:15,pitch:45})

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

document.getElementById("encounter-photo").src=
"https://source.unsplash.com/400x300/?architecture,city"

document.getElementById("encounter").style.display="block"

}

function closeEncounter(){

document.getElementById("note").value=""

document.getElementById("encounter").style.display="none"

}

function saveEncounter(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"collectEncounter",
user:USER_ID,
site_name:currentEncounter.name,
lat:currentEncounter.coords[1],
lng:currentEncounter.coords[0],
note:document.getElementById("note").value
})
})

closeEncounter()

}

function startWalk(){

if(watchId){
navigator.geolocation.clearWatch(watchId)
}

watchId=navigator.geolocation.watchPosition(updateWalk)

}

function pauseWalk(){
navigator.geolocation.clearWatch(watchId)
}

function resumeWalk(){
watchId=navigator.geolocation.watchPosition(updateWalk)
}

function endWalk(){
navigator.geolocation.clearWatch(watchId)
}

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

map.easeTo({
center:coords,
zoom:17,
pitch:65
})

}

async function toggleMemories(){

archiveMarkers.forEach(m=>m.remove())
archiveMarkers=[]

const res=await fetch(API_URL+"?action=getMemories&user="+USER_ID)

const memories=await res.json()

memories.forEach(mem=>{

const marker=new mapboxgl.Marker({color:"#ff9ecb"})
.setLngLat([mem.lng,mem.lat])
.addTo(map)

const popup=new mapboxgl.Popup({offset:25})
.setHTML(`<b>${mem.site_name}</b><br>${mem.note||""}`)

marker.setPopup(popup)

archiveMarkers.push(marker)

})

}

async function openCollection(){

document.getElementById("collection-page").style.display="block"

const grid=document.getElementById("collection-grid")

grid.innerHTML="Loading..."

const res=await fetch(API_URL+"?action=getMemories&user="+USER_ID)

const data=await res.json()

grid.innerHTML=""

data.forEach(card=>{

const div=document.createElement("div")

div.style.border="1px solid #ddd"
div.style.borderRadius="12px"
div.style.padding="10px"

div.innerHTML=`
<img src="https://source.unsplash.com/400x300/?architecture,city"
style="width:100%;border-radius:8px">

<h3>${card.site_name}</h3>

<p style="font-size:13px">${card.note||""}</p>
`

grid.appendChild(div)

})

}

function closeCollection(){
document.getElementById("collection-page").style.display="none"
}

async function shareJourney(){

const card=document.getElementById("encounter")

const canvas=await html2canvas(card)

canvas.toBlob(blob=>{

const link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="encounter-card.png"
link.click()

})

}

</script>
</body>
</html>
