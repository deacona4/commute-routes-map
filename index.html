<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hot Girl Walks</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>

body{
margin:0;
font-family:Inter, sans-serif;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* INTRO */

#intro{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

background:#ff7fa5;
color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

z-index:999;
text-align:center;

}

#intro h1{
font-size:64px;
line-height:0.9;
margin:0;
}

#intro button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:20px;
background:white;
color:#ff7fa5;
font-weight:bold;
}

/* NAV */

#top-nav{

position:fixed;
top:0;
left:0;
right:0;

height:50px;

background:white;

display:flex;
align-items:center;
justify-content:center;
gap:20px;

z-index:200;

box-shadow:0 2px 8px rgba(0,0,0,0.2);

}

#top-nav button{
border:none;
background:none;
font-weight:bold;
cursor:pointer;
}

/* PLANNER */

#planner{

position:fixed;
bottom:0;
left:0;
right:0;

background:white;

padding:16px;

border-radius:20px 20px 0 0;

box-shadow:0 -5px 20px rgba(0,0,0,0.2);

z-index:200;

transition:transform .3s;

}

#planner.collapsed{
transform:translateY(100%);
}

#planner input,
#planner select{

width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;

}

#planner button{

width:100%;
padding:10px;

border:none;
border-radius:20px;

background:#ff7fa5;
color:white;

margin-top:5px;

}

/* WALK CONTROLS */

#walk-controls{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:none;

gap:10px;

z-index:300;

}

#walk-controls button{

padding:10px 14px;
border:none;
border-radius:20px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.2);

}

/* ENCOUNTER */

#encounter{

position:fixed;
left:0;
right:0;

bottom:-450px;

background:white;

padding:16px;

border-radius:20px 20px 0 0;

box-shadow:0 -5px 20px rgba(0,0,0,0.3);

transition:bottom .3s;

z-index:400;

}

#encounter.active{
bottom:0;
}

.star{
font-size:22px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:#ffcc00;
}

textarea{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
margin-top:8px;
}

</style>

</head>

<body>

<div id="intro">
<h1>HOT<br>GIRLS<br>WALK</h1>
<button onclick="startApp()">Start Exploring</button>
</div>

<div id="top-nav">
<button onclick="modePlan()">Plan</button>
<button onclick="modeWalk()">Walk</button>
<button onclick="modeExplore()">Explore</button>
</div>

<div id="map"></div>

<div id="planner">

<h3>Plan your Hot Girl Walk</h3>

<input id="home" placeholder="Start postcode">
<input id="work" placeholder="Destination postcode">

<select id="type">
<option value="curated">✨ Your curated Hot Girl Walk</option>
<option value="street_art">Street art</option>
<option value="historic">Historic</option>
<option value="galleries">Galleries</option>
</select>

<button onclick="createRoute()">Generate Walk</button>
<button onclick="refreshWalk()">Refresh discoveries</button>
<button onclick="startWalk()">Start Walk</button>

</div>

<div id="walk-controls">

<button onclick="pauseWalk()">Pause</button>
<button onclick="resumeWalk()">Resume</button>
<button onclick="endWalk()">End Walk</button>

</div>

<div id="encounter">

<h3 id="encounter-title"></h3>

<div>

Beauty:
<span class="star" data-cat="beauty">★</span>
<span class="star" data-cat="beauty">★</span>
<span class="star" data-cat="beauty">★</span>
<span class="star" data-cat="beauty">★</span>
<span class="star" data-cat="beauty">★</span>

</div>

<div>

History:
<span class="star" data-cat="history">★</span>
<span class="star" data-cat="history">★</span>
<span class="star" data-cat="history">★</span>
<span class="star" data-cat="history">★</span>
<span class="star" data-cat="history">★</span>

</div>

<div>

Hidden Gem:
<span class="star" data-cat="hidden">★</span>
<span class="star" data-cat="hidden">★</span>
<span class="star" data-cat="hidden">★</span>
<span class="star" data-cat="hidden">★</span>
<span class="star" data-cat="hidden">★</span>

</div>

<textarea id="note" placeholder="What did you notice?"></textarea>

<input type="file" id="photo">

<br><br>

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>

<script>

const MAPBOX_TOKEN="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbynF6QPJUh5fR-yu8HtlDSDZyjy73LOARMynPphhdrufYeKwH9MqK7ci2XafG7biJQD/exec"

mapboxgl.accessToken=MAPBOX_TOKEN

const LONDON_BOUNDS=[[-0.563,51.261],[0.280,51.686]]

let map
let routeCoords=null
let markers=[]
let userMarker=null
let watchId=null
let currentSite=null

function startApp(){

document.getElementById("intro").style.display="none"

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:11,
maxBounds:LONDON_BOUNDS
})

map.addControl(new mapboxgl.NavigationControl())

}

function modePlan(){
document.getElementById("planner").classList.remove("collapsed")
}

function modeWalk(){
startWalk()
}

function modeExplore(){
loadArchive()
}

async function createRoute(){

const home=document.getElementById("home").value
const work=document.getElementById("work").value

const res=await fetch(API_URL+"?action=route&home="+encodeURIComponent(home)+"&work="+encodeURIComponent(work))

const data=await res.json()

routeCoords=data.geometry.coordinates

drawRoute()
generateStops()

}

function drawRoute(){

const geo={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{
type:"LineString",
coordinates:routeCoords
}
}]
}

if(map.getSource("route")){
map.getSource("route").setData(geo)
}else{

map.addSource("route",{type:"geojson",data:geo})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff7fa5",
"line-width":6
}
})

}

}

async function generateStops(){

markers.forEach(m=>m.remove())
markers=[]

const line=turf.lineString(routeCoords)
const length=turf.length(line)

for(let i=1;i<=4;i++){

const pt=turf.along(line,length/5*i)

const el=document.createElement("div")

el.style.width="30px"
el.style.height="30px"
el.style.borderRadius="50%"
el.style.background="#ff7fa5"
el.style.color="white"
el.style.display="flex"
el.style.alignItems="center"
el.style.justifyContent="center"

el.innerText=i

const marker=new mapboxgl.Marker(el)
.setLngLat(pt.geometry.coordinates)
.addTo(map)

marker.getElement().onclick=()=>openEncounter({
name:"Discovery "+i,
coords:pt.geometry.coordinates
})

markers.push(marker)

}

}

function refreshWalk(){
if(routeCoords) generateStops()
}

function startWalk(){

document.getElementById("planner").classList.add("collapsed")
document.getElementById("walk-controls").style.display="flex"

watchId=navigator.geolocation.watchPosition(updateWalk)

}

function pauseWalk(){
navigator.geolocation.clearWatch(watchId)
}

function resumeWalk(){
watchId=navigator.geolocation.watchPosition(updateWalk)
}

function endWalk(){

navigator.geolocation.clearWatch(watchId)

document.getElementById("planner").classList.remove("collapsed")
document.getElementById("walk-controls").style.display="none"

}

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

const el=document.createElement("div")

el.style.width="18px"
el.style.height="18px"
el.style.background="#8fb6ff"
el.style.borderRadius="50%"
el.style.border="3px solid white"

userMarker=new mapboxgl.Marker(el)
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

map.easeTo({center:coords})

}

function openEncounter(site){

currentSite=site

document.getElementById("encounter-title").innerText=site.name

document.getElementById("encounter").classList.add("active")

}

function closeEncounter(){

document.getElementById("encounter").classList.remove("active")

}

async function saveEncounter(){

const note=document.getElementById("note").value

const payload={
action:"encounter",
user_id:"demo_user",
site_name:currentSite.name,
route_id:"route",
note:note,
lat:currentSite.coords[1],
lng:currentSite.coords[0]
}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Saved!")

}

async function loadArchive(){

const data=await fetch(API_URL+"?action=encounters").then(r=>r.json())

data.forEach(e=>{

if(!e.lng||!e.lat) return

const marker=new mapboxgl.Marker()
.setLngLat([e.lng,e.lat])
.addTo(map)

marker.getElement().onclick=()=>openEncounter({
name:e.site_name,
coords:[e.lng,e.lat]
})

})

}

</script>

</body>
</html>
