<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">

<style>

body{

}

height:100vh;
}

/* HOME */

#home-screen{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:#ff2fa3;

display:flex;
flex-direction:column;

align-items:center;

z-index:20;

}

.home-title{
font-size:64px;
font-weight:800;
color:white;
}

.home-sub{
color:white;
margin-top:10px;
}

.home-buttons{
margin-top:30px;
}

.home-buttons button{

padding:14px 24px;
border:none;
border-radius:10px;

background:white;
color:#ff2fa3;

font-weight:700;
cursor:pointer;

}


/* SEARCH BAR */

#search-container{

position:absolute;

top:20px;
right:20px;

background:white;

padding:10px;

border-radius:12px;

box-shadow:0 4px 16px rgba(0,0,0,0.2);

z-index:5;

width:320px;

}

#culture-filter{

margin-top:6px;
font-size:13px;

display:flex;
flex-wrap:wrap;
gap:6px;

}

.filter-chip{

padding:4px 8px;

border-radius:8px;

background:#eee;

cursor:pointer;

}

.filter-chip.active{

background:#ff2fa3;

}


/* NAV */

#top-nav{

position:absolute;

bottom:20px;
left:50%;

transform:translateX(-50%);

background:white;

padding:8px 12px;

border-radius:20px;

box-shadow:0 4px 16px rgba(0,0,0,.2);

z-index:5;

}

#top-nav button{

border:none;
background:none;

margin:0 6px;

font-weight:600;
cursor:pointer;

}


/* JOURNEY */

#journey-panel{

position:absolute;
top:120px;
left:20px;

width:260px;

background:white;

padding:14px;

border-radius:12px;

box-shadow:0 6px 16px rgba(0,0,0,0.2);

z-index:3;

display:none;

}


/* WALK CONTROLS */

#walk-controls{

position:absolute;
bottom:80px;
left:50%;

transform:translateX(-50%);

display:none;

gap:6px;

z-index:3;

}

#walk-controls button{

padding:8px 14px;

border:none;

border-radius:8px;

background:#ff2fa3;

color:white;

cursor:pointer;

}


/* MOBILE */

@media(max-width:700px){

#search-container{

left:50%;
transform:translateX(-50%);

right:auto;

width:90%;

}

}


/* MARKERS */

.marker-number{

display:flex;
align-items:center;
justify-content:center;

width:28px;
height:28px;

background:#e63946;

border:3px solid white;

border-radius:50%;

color:white;

font-weight:600;

}

</style>

</head>

<body>


<!-- HOME SCREEN -->

<div id="home-screen">

<div class="home-title">Hot Girl Walk</div>

<div class="home-sub">
Turn your everyday walk into cultural discovery
</div>

<div class="home-buttons">
<button onclick="startApp()">Start Walk</button>
</div>

</div>


<!-- SEARCH -->

<div id="search-container">

<div id="search-bar"></div>

<div id="culture-filter"></div>

</div>


<!-- NAV -->

<div id="top-nav">

<button onclick="previewJourney()">Preview</button>
<button onclick="startWalk()">Start Walk</button>
<button onclick="toggleMemories()">Memories</button>

</div>


<!-- JOURNEY PANEL -->

<div id="journey-panel">

<b>Your Hot Girl Walk</b><br>

Encounters will appear here.

</div>


<!-- WALK CONTROLS -->

<div id="walk-controls">

<button onclick="pauseWalk()">Pause</button>
<button onclick="resumeWalk()">Resume</button>
<button onclick="endWalk()">End</button>

</div>


<div id="map"></div>


<script>


/* CONFIG */

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbzTVvAMThy9vWQJIPYFe286T-N0zGSO4DHUASSWkX_6o6PCsxrP0x5y4rnBzNvy2fJI/exec"


/* STATE */

let map
let routeCoords=null
let markers=[]
let archiveMarkers=[]

let siteCache=new Map()
let wikiCache=new Map()

let destinationCoords=null

let watchId=null
let userMarker=null
let lastPosition=null

let walkActive=false

let selectedCulture=[]


/* USER */

let USER_ID = localStorage.getItem("hg_user")

if(!USER_ID){

USER_ID = crypto.randomUUID()

localStorage.setItem("hg_user",USER_ID)

}


/* START APP */

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}


/* INIT MAP */

function initMap(){

if(map) return

map=new mapboxgl.Map({

container:"map",

style:"mapbox://styles/mapbox/streets-v12",

center:[-0.1276,51.5072],

zoom:12

})

map.addControl(new mapboxgl.NavigationControl())

initDestinationSearch()

loadCultureFilters()

startGPS()

}


/* GPS BLUE DOT */

function startGPS(){

navigator.geolocation.watchPosition(pos=>{

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

map.setCenter(coords)

}else{

userMarker.setLngLat(coords)

}

})

}
/* ----------------------------------------------------
DESTINATION SEARCH
---------------------------------------------------- */

function initDestinationSearch(){

const geocoder=new MapboxGeocoder({

accessToken:mapboxgl.accessToken,

mapboxgl:mapboxgl,

placeholder:"Where are you walking to?"

})

document.getElementById("search-bar")
.appendChild(geocoder.onAdd(map))

geocoder.on("result",async e=>{

destinationCoords=e.result.center

resetJourney()

await routeFromHere()

})

}


/* ----------------------------------------------------
CULTURE FILTER UI
---------------------------------------------------- */

async function loadCultureFilters(){

const types=await fetch(API_URL+"?action=cultureTypes").then(r=>r.json())

const container=document.getElementById("culture-filter")

types.forEach(type=>{

const chip=document.createElement("div")

chip.className="filter-chip"

chip.innerText=type

chip.onclick=()=>{

chip.classList.toggle("active")

if(selectedCulture.includes(type)){

selectedCulture=selectedCulture.filter(t=>t!==type)

}else{

selectedCulture.push(type)

}

}

container.appendChild(chip)

})

}


/* ----------------------------------------------------
RESET ROUTE
---------------------------------------------------- */

function resetJourney(){

routeCoords=null

markers.forEach(m=>m.remove())
markers=[]

if(map.getSource("route")){

map.removeLayer("route")
map.removeSource("route")

}

document.getElementById("journey-panel").style.display="none"

}


/* ----------------------------------------------------
ROUTE FROM GPS
---------------------------------------------------- */

async function routeFromHere(){

navigator.geolocation.getCurrentPosition(async pos=>{

const startLat=pos.coords.latitude
const startLng=pos.coords.longitude

const destLng=destinationCoords[0]
const destLat=destinationCoords[1]

const url =
API_URL+
"?action=routeFromCoords"+
"&lat="+startLat+
"&lng="+startLng+
"&destLng="+destLng+
"&destLat="+destLat

const res=await fetch(url)

const data=await res.json()

if(!data.geometry){

alert("Route error")
return

}

routeCoords=data.geometry.coordinates

drawRoute(routeCoords)

zoomToRoute()

/* load cultural sites in background */

loadEncounters(routeCoords)

})

}


/* ----------------------------------------------------
DRAW ROUTE
---------------------------------------------------- */

function drawRoute(coords){

const geojson={

type:"FeatureCollection",

features:[{

type:"Feature",

geometry:{
type:"LineString",
coordinates:coords
}

}]

}

if(map.getSource("route")){

map.getSource("route").setData(geojson)

}else{

map.addSource("route",{type:"geojson",data:geojson})

map.addLayer({

id:"route",
type:"line",
source:"route",

paint:{
"line-color":"#ff2fa3",
"line-width":6
}

})

}

}


/* ----------------------------------------------------
ZOOM TO ROUTE
---------------------------------------------------- */

function zoomToRoute(){

const bounds=turf.bbox(turf.lineString(routeCoords))

map.fitBounds(bounds,{padding:60})

}


/* ----------------------------------------------------
PREVIEW TOUR
---------------------------------------------------- */

async function previewJourney(){

if(!routeCoords) return

const start=routeCoords[0]

map.flyTo({center:start,zoom:15})

await new Promise(r=>setTimeout(r,1500))

for(const marker of markers){

map.flyTo({

center:marker.getLngLat(),
zoom:16

})

openEncounter(marker.site)

await new Promise(r=>setTimeout(r,2500))

}

map.flyTo({center:start,zoom:14})

}


/* ----------------------------------------------------
FETCH CULTURAL SITES (OVERPASS + WIKIDATA)
---------------------------------------------------- */

async function fetchCulturalSites(coords){

const line=turf.lineString(coords)

const bbox=turf.bbox(line)

const query=`

[out:json];

(

node["tourism"~"museum|gallery"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["historic"~"monument|memorial|building|archaeological_site"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["historic"="plaque"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["amenity"="arts_centre"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["amenity"="theatre"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["historic"="house"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

node["heritage"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});

);

out center;

`

const res=await fetch(
"https://overpass.kumi.systems/api/interpreter",
{method:"POST",body:query}
)

const data=await res.json()

const sites=data.elements.map(el=>{

const lon=el.lon||el.center?.lon
const lat=el.lat||el.center?.lat

if(!lon||!lat) return null
if(!el.tags?.name) return null

return{

name:el.tags.name,
coords:[lon,lat],
tags:el.tags

}

}).filter(Boolean)

return sites

}


/* ----------------------------------------------------
RANK CULTURAL SITES
---------------------------------------------------- */

function rankSites(sites,coords){

const line=turf.lineString(coords)

return sites

.map(site=>{

const dist=turf.pointToLineDistance(
turf.point(site.coords),
line,
{units:"kilometers"}
)

let importance=1

if(site.tags?.tourism==="museum") importance=4
if(site.tags?.tourism==="gallery") importance=3
if(site.tags?.historic) importance=3
if(site.tags?.tourism==="artwork") importance=2

return{

site:site,
score:(4-dist)+importance

}

})

.sort((a,b)=>b.score-a.score)

.map(s=>s.site)

}


/* ----------------------------------------------------
SPREAD ENCOUNTERS
---------------------------------------------------- */

function spreadEncounters(sites){

const spaced=[]
const used=[]

sites.forEach(site=>{

let tooClose=false

used.forEach(u=>{

const d=turf.distance(
turf.point(u.coords),
turf.point(site.coords),
{units:"kilometers"}
)

if(d<0.5) tooClose=true

})

if(!tooClose){

spaced.push(site)
used.push(site)

}

})

return spaced.slice(0,4)

}


/* ----------------------------------------------------
LOAD ENCOUNTERS
---------------------------------------------------- */

async function loadEncounters(coords){

const sites=await fetchCulturalSites(coords)

const ranked=rankSites(sites,coords)

const selected=spreadEncounters(ranked)

selected.forEach((site,i)=>{

const el=document.createElement("div")

el.className="marker-number"
el.innerText=i+1

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(map)

marker.site=site

marker.getElement().onclick=()=>openEncounter(site)

markers.push(marker)

})

document.getElementById("journey-panel").style.display="block"

}
/* ----------------------------------------------------
ENCOUNTER CARD HTML
---------------------------------------------------- */

const encounterHTML = `
<div id="encounter" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
display:none;
z-index:10;
">

<img id="encounter-photo" style="
width:100%;
height:160px;
object-fit:cover;
border-radius:8px
">

<h3 id="encounter-title"></h3>

<div id="prompt" style="font-style:italic;margin-bottom:8px"></div>

<div class="rating">
Beauty
<input id="rating-beauty" type="number" min="1" max="5" value="3">
</div>

<div class="rating">
History
<input id="rating-history" type="number" min="1" max="5" value="3">
</div>

<div class="rating">
Hidden Gem
<input id="rating-hidden" type="number" min="1" max="5" value="3">
</div>

<textarea id="note" placeholder="Write reflection..."></textarea>

<br><br>

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>
`

document.body.insertAdjacentHTML("beforeend", encounterHTML)


/* ----------------------------------------------------
WIKIPEDIA LOOKUP
---------------------------------------------------- */

async function fetchWiki(siteName){

if(!siteName) return null

if(wikiCache.has(siteName)) return wikiCache.get(siteName)

try{

const searchURL=`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(siteName)}&format=json&origin=*`

const searchRes=await fetch(searchURL)

const searchData=await searchRes.json()

if(!searchData.query.search.length){

wikiCache.set(siteName,null)
return null

}

const pageTitle=searchData.query.search[0].title

const summaryURL=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`

const summaryRes=await fetch(summaryURL)

if(!summaryRes.ok){

wikiCache.set(siteName,null)
return null

}

const summaryData=await summaryRes.json()

wikiCache.set(siteName,summaryData)

return summaryData

}catch(err){

wikiCache.set(siteName,null)
return null

}

}


/* ----------------------------------------------------
REFLECTION PROMPTS
---------------------------------------------------- */

async function fetchPrompt(){

const prompts=await fetch(API_URL+"?action=prompts").then(r=>r.json())

return prompts[Math.floor(Math.random()*prompts.length)]

}


/* ----------------------------------------------------
OPEN ENCOUNTER
---------------------------------------------------- */

let currentEncounter=null

async function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

const wiki=await fetchWiki(site.name)

if(wiki?.thumbnail){

document.getElementById("encounter-photo").src=wiki.thumbnail.source

}

const prompt=await fetchPrompt()

document.getElementById("prompt").innerText=prompt

document.getElementById("encounter").style.display="block"

}


/* ----------------------------------------------------
CLOSE ENCOUNTER
---------------------------------------------------- */

function closeEncounter(){

document.getElementById("encounter").style.display="none"

}


/* ----------------------------------------------------
SAVE ENCOUNTER → GOOGLE SHEETS
---------------------------------------------------- */

async function saveEncounter(){

if(!currentEncounter) return

const payload={

action:"encounter",

user_id:USER_ID,

site_name:currentEncounter.name,

note:document.getElementById("note").value,

lat:currentEncounter.coords[1],

lng:currentEncounter.coords[0],

beauty:document.getElementById("rating-beauty").value,

history:document.getElementById("rating-history").value,

hidden_gem:document.getElementById("rating-hidden").value,

category:"culture"

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Saved as memory!")

addMemoryMarker(currentEncounter)

closeEncounter()

}


/* ----------------------------------------------------
MEMORY MARKERS (PHOTO STYLE)
---------------------------------------------------- */

function addMemoryMarker(site){

const el=document.createElement("div")

el.style.width="32px"
el.style.height="32px"
el.style.background="#2b7cff"
el.style.borderRadius="50%"
el.style.border="3px solid white"

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(map)

archiveMarkers.push(marker)

}


/* ----------------------------------------------------
LOAD SAVED MEMORIES
---------------------------------------------------- */

async function loadEncounterArchive(){

const data=await fetch(API_URL+"?action=encounters").then(r=>r.json())

data.forEach(e=>{

if(!e.lng||!e.lat) return

const marker=new mapboxgl.Marker({color:"blue"})
.setLngLat([e.lng,e.lat])
.addTo(map)

archiveMarkers.push(marker)

})

}


function toggleMemories(){

if(archiveMarkers.length){

archiveMarkers.forEach(m=>m.remove())
archiveMarkers=[]
return

}

loadEncounterArchive()

}


/* ----------------------------------------------------
WALK MODE
---------------------------------------------------- */

function startWalk(){

if(!routeCoords){

alert("Generate route first")
return

}

if(walkActive) return

walkActive=true

watchId=navigator.geolocation.watchPosition(updateWalk)

document.getElementById("walk-controls").style.display="flex"

}


/* ----------------------------------------------------
GPS WALK CAMERA
---------------------------------------------------- */

function updateWalk(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

let bearing=0

if(lastPosition){

bearing=turf.bearing(
turf.point(lastPosition),
turf.point(coords)
)

}

lastPosition=coords

map.easeTo({

center:coords,
zoom:17,
pitch:60,
bearing:bearing,
duration:800

})

checkNearbySites(coords)

}


/* ----------------------------------------------------
AUTO ENCOUNTER TRIGGER
---------------------------------------------------- */

function checkNearbySites(userCoords){

markers.forEach(marker=>{

const site=marker.site

const dist=turf.distance(
turf.point(userCoords),
turf.point(site.coords),
{units:"meters"}
)

if(dist<40){

openEncounter(site)

}

})

}


/* ----------------------------------------------------
SHARE JOURNEY
---------------------------------------------------- */

async function shareJourney(){

const canvas=await html2canvas(document.body)

canvas.toBlob(async blob=>{

const file=new File([blob],"hot-girl-walk.png",{type:"image/png"})

if(navigator.share){

await navigator.share({

title:"Hot Girl Walk",

text:"Look what I discovered on my walk ✨",

files:[file]

})

}else{

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="hot-girl-walk.png"

link.click()

}

})

}


/* ----------------------------------------------------
END APP
---------------------------------------------------- */

</script>

</body>

</html>
