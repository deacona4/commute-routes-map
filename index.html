<script>

CONFIG

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbz3OUzh-oRI7x_-ABNtD1k378yfXqf9ZkP8qrWpv52VpYCnvmMoOz36L1LoycI2wrlI/exec"

/************************************************
GLOBAL STATE (ORIGINAL + EXTENDED)
************************************************/

let map
let routeCoords=null
let markers=[]

let startCoords=null
let destinationCoords=null

let walkWatcher=null
let userMarker=null

let walkMode=false

let currentEncounter=null
let uploadedPhotoBase64=null

let previewFrames=[]

let USER_ID=localStorage.getItem("hg_user")
function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms))
}  

if(!USER_ID){
USER_ID=crypto.randomUUID()
localStorage.setItem("hg_user",USER_ID)
}

/************************************************
START APP
************************************************/

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}

/************************************************
MAP INITIALIZATION
************************************************/

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12
})

map.addControl(new mapboxgl.NavigationControl())

map.on("load",()=>{

requestGPS()
initSearch()

})

document.getElementById("gps-btn").onclick=requestGPS

}

/************************************************
GPS LOCATION
************************************************/

function requestGPS(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(pos=>{

startCoords=[pos.coords.longitude,pos.coords.latitude]

map.flyTo({
center:startCoords,
zoom:14
})

})

}

/************************************************
SEARCH BOXES
************************************************/

function initSearch(){

const startGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Start location"
})

document.getElementById("start-search")
.appendChild(startGeo.onAdd(map))

startGeo.on("result",e=>{
startCoords=e.result.center
})

const destGeo=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Destination"
})

document.getElementById("dest-search")
.appendChild(destGeo.onAdd(map))

destGeo.on("result",e=>{
destinationCoords=e.result.center
})

document.getElementById("route-button").onclick=generateRoute

}

/************************************************
GENERATE ROUTE
************************************************/

async function generateRoute(){

if(!startCoords || !destinationCoords){
alert("Select start and destination")
return
}

const url=
API_URL+
"?action=routeFromCoords"+
"&lat="+startCoords[1]+
"&lng="+startCoords[0]+
"&destLng="+destinationCoords[0]+
"&destLat="+destinationCoords[1]

const res=await fetch(url)
const data=await res.json()

if(!data.geometry){
alert("Route generation failed")
return
}

routeCoords=data.geometry.coordinates

drawRoute(routeCoords)

await loadEncounters(routeCoords)

}

/************************************************
DRAW ROUTE (FIXED: FIT BOUNDS)
************************************************/

function drawRoute(coords){

const geojson={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{
type:"LineString",
coordinates:coords
}
}]
}

if(map.getSource("route")){
map.getSource("route").setData(geojson)
}else{

map.addSource("route",{
type:"geojson",
data:geojson
})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

/* 🔥 FIX: auto zoom */
const bounds=coords.reduce(
(b,c)=>b.extend(c),
new mapboxgl.LngLatBounds(coords[0],coords[0])
)

map.fitBounds(bounds,{padding:60})

}

/************************************************
OVERPASS FETCH (FIXED WITH RETRY)
************************************************/

async function fetchOverpass(query){

try{

const res=await fetch(
"https://overpass-api.de/api/interpreter",
{method:"POST",body:query}
)

const text=await res.text()

if(!text.startsWith("{")) throw "bad"

return JSON.parse(text)

}catch(e){

const res=await fetch(
"https://overpass.kumi.systems/api/interpreter",
{method:"POST",body:query}
)

return await res.json()

}

}

/************************************************
DISCOVERY ENGINE (FULL FIX)
************************************************/

async function loadEncounters(coords){

markers.forEach(m=>m.remove())
markers=[]

const line=turf.lineString(coords)
const bbox=turf.bbox(line)

const query=`
[out:json];
(
node["tourism"="museum"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["tourism"="artwork"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["tourism"="gallery"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["amenity"="theatre"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["historic"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
);
out center;
`

const data=await fetchOverpass(query)

if(!data.elements) return

const candidates=[]

data.elements.forEach(el=>{

if(!el.tags || !el.tags.name) return

const coords=[el.lon||el.center.lon,el.lat||el.center.lat]

const point=turf.point(coords)

const dist=turf.pointToLineDistance(
point,
line,
{units:"kilometers"}
)

/* 🔥 ONLY ON ROUTE */
if(dist>0.2) return

candidates.push({
name:el.tags.name,
coords:coords,
distance:dist,
tags:el.tags
})

})

if(candidates.length===0) return

/* 🔥 SORT BY DISTANCE */
candidates.sort((a,b)=>a.distance-b.distance)

/* 🔥 PICK SPACED */
for(const site of candidates){

if(markers.length>=6) break

const marker=new mapboxgl.Marker({color:"#ff2fa3"})
.setLngLat(site.coords)
.addTo(map)

marker.site=site

marker.getElement().onclick=()=>openEncounter(site)

markers.push(marker)

}

}
/************************************************
DISCOVERY TYPE (GAME FEEL RESTORED)
************************************************/

function getDiscovery(distance){

if(distance<0.05) return "Landmark"
if(distance<0.1) return "Notable"
if(distance<0.2) return "HiddenGem"

return "Secret"

}

/************************************************
PREVIEW JOURNEY (VIDEO + ORDERED)
************************************************/

async function previewJourney(){

if(!routeCoords || markers.length===0){
alert("Generate a route first")
return
}

const line=turf.lineString(routeCoords)

/* 🔥 ORDER PROPERLY */
const ordered=markers.map(m=>{

const pt=turf.point(m.site.coords)

const snapped=turf.nearestPointOnLine(line,pt)

return{
site:m.site,
dist:snapped.properties.location
}

}).sort((a,b)=>a.dist-b.dist)

/* 🎥 VIDEO SETUP */
const canvas=document.createElement("canvas")
canvas.width=540
canvas.height=960
const ctx=canvas.getContext("2d")

const stream=canvas.captureStream(2)
const recorder=new MediaRecorder(stream)

const chunks=[]

recorder.ondataavailable=e=>{
if(e.data.size) chunks.push(e.data)
}

recorder.start()

/* START AT ORIGIN */
map.flyTo({
center:routeCoords[0],
zoom:16,
pitch:55
})

await sleep(1500)

/* LOOP ENCOUNTERS */
for(const item of ordered){

map.flyTo({
center:item.site.coords,
zoom:17,
pitch:65,
duration:1400
})

await sleep(1500)

openEncounter(item.site)

await sleep(1200)

/* CAPTURE */
ctx.drawImage(map.getCanvas(),0,0,540,960)

closeEncounter()

}

/* RETURN TO START */
map.flyTo({
center:routeCoords[0],
zoom:14,
pitch:40
})

await sleep(1500)

recorder.stop()

const blob=await new Promise(res=>{
recorder.onstop=()=>res(new Blob(chunks,{type:"video/webm"}))
})

/* SHARE */
const file=new File([blob],"walk.webm",{type:"video/webm"})

if(navigator.share && navigator.canShare?.({files:[file]})){
navigator.share({files:[file]})
}else{
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="walk.webm"
a.click()
}

}

/************************************************
WALK MODE
************************************************/

function startWalk(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

walkMode=true

document.getElementById("search-panel").style.display="none"
document.getElementById("walk-indicator").style.display="block"

map.easeTo({pitch:70,zoom:17})

walkWatcher=navigator.geolocation.watchPosition(
updateWalkPosition,
gpsError,
{enableHighAccuracy:true}
)

}

function stopWalk(){

walkMode=false

if(walkWatcher){
navigator.geolocation.clearWatch(walkWatcher)
}

document.getElementById("search-panel").style.display="block"
document.getElementById("walk-indicator").style.display="none"

map.easeTo({pitch:0,zoom:14})

}

function gpsError(err){
console.warn(err)
}

/************************************************
USER TRACKING
************************************************/

function updateWalkPosition(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!userMarker){

userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(map)

}else{

userMarker.setLngLat(coords)

}

map.easeTo({
center:coords,
zoom:17,
pitch:70
})

checkDiscovery(coords)

}

/************************************************
PROXIMITY DISCOVERY
************************************************/

function checkDiscovery(userCoords){

markers.forEach(marker=>{

if(marker.discovered) return

const site=marker.site

const distance=turf.distance(
turf.point(userCoords),
turf.point(site.coords),
{units:"kilometers"}
)

if(distance<0.05){

marker.discovered=true

navigator.vibrate?.(200)

openEncounter(site)

}

})

}

/************************************************
ENCOUNTER CARD
************************************************/

async function openEncounter(site){

currentEncounter=site

document.getElementById("encounter-title").innerText=site.name

const badge=document.getElementById("encounter-badge")

const type=getDiscovery(site.distance||0)

badge.innerText=type
badge.className="badge discovery-"+type

document.getElementById("encounter-image").src=
"https://picsum.photos/400/250?random="+Math.random()

document.getElementById("encounter").style.display="block"

}

function closeEncounter(){
document.getElementById("encounter").style.display="none"
}

/************************************************
SAVE ENCOUNTER (BACKEND)
************************************************/

function saveEncounter(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

action:"encounter",
user_id:USER_ID,
site_name:currentEncounter.name,
lat:currentEncounter.coords[1],
lng:currentEncounter.coords[0],
note:document.getElementById("note").value

})
})

closeEncounter()

}

/************************************************
SAVE ROUTE
************************************************/

function saveCurrentRoute(){

if(!routeCoords) return

const routes=JSON.parse(localStorage.getItem("routes")||"[]")

routes.push({
coords:routeCoords,
date:Date.now()
})

localStorage.setItem("routes",JSON.stringify(routes))

alert("Route saved 📍")

}

/************************************************
SHARE ENCOUNTER CARD
************************************************/

async function shareEncounter(){

const card=document.getElementById("encounter")

const canvas=await html2canvas(card)

canvas.toBlob(blob=>{

const file=new File([blob],"card.png")

if(navigator.share && navigator.canShare?.({files:[file]})){
navigator.share({files:[file]})
}

})

}

/************************************************
COLLECTION PAGE
************************************************/

async function openCollection(){

const page=document.getElementById("collection-page")

page.style.display="block"

const res=await fetch(API_URL+"?action=encounters")
const data=await res.json()

page.innerHTML="<h2>Your Collection</h2>"

data.forEach(card=>{

const div=document.createElement("div")

div.innerHTML=`
<h3>${card.site_name}</h3>
<p>${card.note||""}</p>
`

page.appendChild(div)

})

}
