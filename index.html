<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Cultural Commute Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
}

#map{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

// MAPBOX TOKEN
mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});


// distance function
function distance(lat1, lon1, lat2, lon2){

const R = 6371000;

const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;

}



// LOAD COMMUTE ROUTES FROM GOOGLE SCRIPT

fetch("https://script.google.com/macros/s/AKfycbzvBuo6pFVBbMO2JWD-YEHtftkvl5DsmCZPTRkwLLxMezVwKOlWxc0OIL1vXphQZWa0/exec")

.then(res=>res.json())

.then(routeData=>{

map.on("load",()=>{

map.addSource("routes",{
type:"geojson",
data:routeData
});

map.addLayer({
id:"routes",
type:"line",
source:"routes",
paint:{
"line-color":"#2a7de1",
"line-width":4,
"line-opacity":0.6
}
});

});

});



// LOAD CULTURAL PLACES FROM OVERPASS

const overpassQuery = `
[out:json];
(
node["tourism"="museum"](51.3,-0.3,51.7,0.2);
node["amenity"="theatre"](51.3,-0.3,51.7,0.2);
node["amenity"="arts_centre"](51.3,-0.3,51.7,0.2);
node["tourism"="gallery"](51.3,-0.3,51.7,0.2);
);
out;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:overpassQuery
})

.then(res=>res.json())

.then(data=>{

data.elements.forEach(place=>{

const lat = place.lat;
const lng = place.lon;

new mapboxgl.Marker({color:"red"})
.setLngLat([lng,lat])
.setPopup(
new mapboxgl.Popup().setHTML(
place.tags.name || "Cultural Venue"
)
)
.addTo(map);

});

});

</script>

</body>
</html>
