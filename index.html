<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hot Girl Walk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#fff7ec;
overflow:hidden;
}

#map{
width:100%;
height:100vh;
}

/* HOME */

#home-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2fa3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:100;
}

.home-title{
font-size:64px;
font-weight:800;
}

.start-button{
margin-top:20px;
padding:14px 24px;
border-radius:30px;
border:none;
background:white;
color:#ff2fa3;
font-weight:700;
cursor:pointer;
}

/* SEARCH PANEL */

#search-panel{
position:absolute;
top:20px;
right:20px;
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.25);
width:320px;
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

/* NAV */

#nav{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
border-radius:30px;
padding:10px 16px;
display:flex;
gap:10px;
box-shadow:0 4px 16px rgba(0,0,0,.25);
z-index:10;
}

#nav button{
border:none;
background:none;
font-weight:600;
cursor:pointer;
}

/* WALK MODE */

.walk-indicator{
position:absolute;
top:14px;
left:14px;
background:#2b7cff;
color:white;
padding:6px 10px;
border-radius:12px;
display:none;
z-index:20;
}

/* ENCOUNTER CARD */

#encounter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:360px;
background:#fff7ec;
border:5px solid #ff2fa3;
border-radius:16px;
padding:16px;
display:none;
z-index:50;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

#encounter img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.badge{
font-size:12px;
font-weight:700;
color:#ff2fa3;
}

.close-btn{
margin-top:10px;
border:none;
padding:8px 12px;
background:#ff2fa3;
color:white;
border-radius:10px;
cursor:pointer;
}



/* PREVIEW PLAYER */

#preview-player{
position:absolute;
inset:0;
background:rgba(0,0,0,.72);
display:none;
justify-content:center;
align-items:center;
z-index:80;
}

.preview-card{
width:min(420px,92vw);
background:#fff7ec;
border:4px solid #ff2fa3;
border-radius:16px;
padding:14px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

#preview-frame{
width:100%;
aspect-ratio:9/16;
object-fit:cover;
border-radius:10px;
background:#ffe3f3;
}

.preview-actions{
display:flex;
gap:10px;
margin-top:10px;
}

.preview-actions button{
flex:1;
border:none;
padding:10px 12px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

#share-story-btn{background:#ff2fa3;color:#fff;}
#end-preview-btn{background:#222;color:#fff;}

</style>
</head>

<body>

<div id="walk-indicator" class="walk-indicator">
Walking Mode
</div>

<div id="home-screen">
<div class="home-title">Hot Girl Walk</div>
<button id="start-btn" class="start-button">Start Walk</button>
</div>

<div id="search-panel">

<div id="start-search"></div>
<button id="gps-btn">Use my GPS</button>

<div id="dest-search"></div>
<button id="route-button">Generate Route</button>

</div>

<div id="nav">
<button id="preview-btn">Preview</button>
<button id="walk-btn">Start Walk</button>
<button id="stop-btn">End Walk</button>
</div>

<div id="map"></div>

<div id="encounter">

<h2 id="encounter-title"></h2>
<div id="encounter-badge" class="badge"></div>
<img id="encounter-image">
<p id="encounter-description"></p>

<button class="close-btn" onclick="closeEncounter()">Close</button>

</div>


<div id="preview-player">
<div class="preview-card">
<img id="preview-frame" alt="Preview story frame">
<div class="preview-actions">
<button id="share-story-btn">Share to Stories</button>
<button id="end-preview-btn">End Preview</button>
</div>
</div>
</div>

<script>

/************************************************
CONFIG
************************************************/

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

/************************************************
GLOBAL STATE
************************************************/

const STATE={
map:null,
startCoords:null,
destinationCoords:null,
routeCoords:null,
encounters:[],
markers:[],
userMarker:null,
walkWatcher:null
};

STATE.overpassCache=new Map()
STATE.previewInterval=null
STATE.previewFrameIndex=0

let previewFrames=[]

/************************************************
UTILITIES
************************************************/

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms))
}

function cacheKeyFromCoord(coord){
return `${coord[0].toFixed(3)},${coord[1].toFixed(3)}`
}

function distanceMeters(a,b){

const km=turf.distance(
turf.point(a),
turf.point(b),
{units:"kilometers"}
)

return km*1000

}


function initRootHandlers(){

const startBtn=document.getElementById("start-btn")

if(startBtn){
startBtn.onclick=startApp
}

/* keep global for backward compatibility with old inline handlers */
window.startApp=startApp

}

initRootHandlers()

/************************************************
APP START
************************************************/

function startApp(){

document.getElementById("home-screen").style.display="none"

initMap()

}

/************************************************
MAP INIT
************************************************/

function initMap(){

STATE.map=new mapboxgl.Map({

container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:12,
pitch:40

})

STATE.map.addControl(new mapboxgl.NavigationControl())

STATE.map.on("load",()=>{

initSearch()
initButtons()

})

}

/************************************************
BUTTONS
************************************************/

function initButtons(){

document.getElementById("gps-btn").onclick=requestGPS
document.getElementById("route-button").onclick=generateRoute
document.getElementById("preview-btn").onclick=previewJourney
document.getElementById("walk-btn").onclick=startWalk
document.getElementById("stop-btn").onclick=stopWalk
document.getElementById("end-preview-btn").onclick=endPreview
document.getElementById("share-story-btn").onclick=createPreviewStory

}

/************************************************
SEARCH
************************************************/

function initSearch(){

const startGeocoder=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Start location",
countries:"gb",
marker:false
})

document
.getElementById("start-search")
.appendChild(startGeocoder.onAdd(STATE.map))

startGeocoder.on("result",e=>{
STATE.startCoords=e.result.center
})

const destGeocoder=new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Destination",
countries:"gb",
marker:false
})

document
.getElementById("dest-search")
.appendChild(destGeocoder.onAdd(STATE.map))

destGeocoder.on("result",e=>{
STATE.destinationCoords=e.result.center
})

}

/************************************************
GPS
************************************************/

function requestGPS(){

if(!STATE.map){
alert("Start the app first.")
return
}

if(!navigator.geolocation){
alert("Geolocation is not supported in this browser.")
return
}

navigator.geolocation.getCurrentPosition(pos=>{

STATE.startCoords=[pos.coords.longitude,pos.coords.latitude]

STATE.map.flyTo({
center:STATE.startCoords,
zoom:15
})

},()=>{

alert("Unable to access GPS. Please allow location permissions.")

})

}

/************************************************
ROUTE
************************************************/

async function generateRoute(){

if(!STATE.startCoords || !STATE.destinationCoords){
alert("Please choose both a start and destination.")
return
}

const url=`https://api.mapbox.com/directions/v5/mapbox/walking/${STATE.startCoords[0]},${STATE.startCoords[1]};${STATE.destinationCoords[0]},${STATE.destinationCoords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`

let data

try{

const res=await fetch(url)

if(!res.ok){
alert("Could not fetch route right now. Please try again.")
return
}

data=await res.json()

}catch(e){

alert("Network error while generating route. Please try again.")
return

}

if(!data.routes || !data.routes.length){
alert("No walking route was found for these points.")
return
}

if(!data.routes || !data.routes.length){
alert("No walking route was found for these points.")
return
}

STATE.routeCoords=data.routes[0].geometry.coordinates

drawRoute()

await loadEncounters()

}

/************************************************
DRAW ROUTE
************************************************/

function drawRoute(){

const geojson={
type:"Feature",
geometry:{
type:"LineString",
coordinates:STATE.routeCoords
}
}

if(STATE.map.getSource("route")){

STATE.map.getSource("route").setData(geojson)

}else{

STATE.map.addSource("route",{type:"geojson",data:geojson})

STATE.map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

const bounds=STATE.routeCoords.reduce(
(b,coord)=>b.extend(coord),
new mapboxgl.LngLatBounds(STATE.routeCoords[0],STATE.routeCoords[0])
)

STATE.map.fitBounds(bounds,{padding:60,maxZoom:16,duration:900})

}
/************************************************
DISCOVERY ENGINE
************************************************/

async function loadEncounters(){

if(!STATE.routeCoords || STATE.routeCoords.length<2) return

clearMarkers()

STATE.encounters=[]

const line = turf.lineString(STATE.routeCoords)

const length = turf.length(line,{units:"kilometers"})

const scanPoints=[]

/* scan route every ~150m with a hard cap to avoid API rate limits */

const rawSegments = Math.max(1,Math.floor(length*1000/250))
const segments = Math.min(rawSegments,10)

for(let i=0;i<=segments;i++){

const dist=(length/segments)*i

const pt=turf.along(line,dist,{units:"kilometers"})

scanPoints.push(pt.geometry.coordinates)

}

const candidates=[]
const uniqueScanPoints=[]
const seenScanPoints=new Set()

for(const p of scanPoints){
const key=cacheKeyFromCoord(p)
if(!seenScanPoints.has(key)){
seenScanPoints.add(key)
uniqueScanPoints.push(p)
}
}

for(const p of uniqueScanPoints){

const sites = await fetchNearbySites(p)

candidates.push(...sites.map(site=>({...site,routePoint:p})))

/* tiny pause helps prevent 429 bursts on long routes */
await sleep(90)

}

/* score cultural value */

for(const c of candidates){

c.score = scoreCulturalSite(c,c.routePoint)

}

const seenKeys=new Set()

const deduped=[]

for(const c of candidates){
const key=`${c.name}-${c.coords[0].toFixed(5)}-${c.coords[1].toFixed(5)}`
if(!seenKeys.has(key)){
seenKeys.add(key)
deduped.push(c)
}
}

/* sort best first */

deduped.sort((a,b)=>b.score-a.score)

/* spread encounters */

const chosen=[]

const minSpacing = 450

for(const site of deduped){

let tooClose=false

for(const e of chosen){

if(distanceMeters(site.coords,e.coords) < minSpacing){

tooClose=true
break

}

}

if(!tooClose){

chosen.push(site)

}

if(chosen.length >= getEncounterCount()) break

}

if(!chosen.length){
const fallbackCount=Math.min(getEncounterCount(),Math.max(2,Math.floor(STATE.routeCoords.length/4)))
for(let i=1;i<=fallbackCount;i++){
const idx=Math.min(
STATE.routeCoords.length-1,
Math.floor((i/(fallbackCount+1))*STATE.routeCoords.length)
)
chosen.push({
name:`Scenic Stop ${i}`,
coords:STATE.routeCoords[idx],
tags:{name:`Scenic Stop ${i}`},
score:0
})
}
}

STATE.encounters = chosen

renderEncounterMarkers()

}

/************************************************
DYNAMIC ENCOUNTER COUNT
************************************************/

function getEncounterCount(){

const line=turf.lineString(STATE.routeCoords)

const length=turf.length(line,{units:"kilometers"})

if(length < 1) return 3
if(length < 2) return 4
if(length < 3) return 5
if(length < 5) return 6

return 7

}

/************************************************
FETCH CULTURAL SITES
************************************************/

async function fetchNearbySites(coord){

const cacheKey=cacheKeyFromCoord(coord)

if(STATE.overpassCache.has(cacheKey)){
return STATE.overpassCache.get(cacheKey)
}

const lat=coord[1]
const lng=coord[0]

const query=`
[out:json][timeout:20];
(
node(around:350,${lat},${lng})["tourism"="museum"];
node(around:350,${lat},${lng})["tourism"="gallery"];
node(around:350,${lat},${lng})["amenity"="theatre"];
node(around:350,${lat},${lng})["tourism"="artwork"];
node(around:350,${lat},${lng})["historic"];
node(around:350,${lat},${lng})["tourism"="attraction"];
);
out;
`

const endpoints=[
"https://overpass-api.de/api/interpreter",
"https://overpass.kumi.systems/api/interpreter"
]

let data

for(let attempt=0;attempt<3;attempt++){

for(const endpoint of endpoints){

try{

const res = await fetch(endpoint,{method:"POST",body:query})

if(res.status===429){
await sleep(600*(attempt+1))
continue
}

if(!res.ok) continue

data = await res.json()
break

}catch(e){

/* try next endpoint */

}

}

if(data) break

await sleep(500*(attempt+1))

}

if(!data?.elements){
STATE.overpassCache.set(cacheKey,[])
return []
}

const sites=[]

for(const el of data.elements){

sites.push({
name:el.tags?.name || "Cultural Site",
coords:[el.lon,el.lat],
tags:el.tags
})

}

STATE.overpassCache.set(cacheKey,sites)

return sites

}

/************************************************
CULTURAL SCORING
************************************************/

function scoreCulturalSite(site,routePoint){

let score = 0

const tags = site.tags || {}

/* cultural importance */

if(tags.tourism === "museum") score += 4
if(tags.tourism === "gallery") score += 3
if(tags.amenity === "theatre") score += 2
if(tags.tourism === "artwork") score += 2
if(tags.historic) score += 2

/* named place */

if(tags.name) score += 1

/* proximity bonus */

const dist = distanceMeters(routePoint,site.coords)

if(dist < 60) score += 2
else if(dist < 120) score += 1

return score

}

/************************************************
CLEAR MARKERS
************************************************/

function clearMarkers(){

STATE.markers.forEach(marker=>marker.remove())

STATE.markers=[]

}

/************************************************
RENDER ENCOUNTER MARKERS
************************************************/

function renderEncounterMarkers(){

STATE.encounters.forEach(site=>{

const el=document.createElement("div")

el.style.width="18px"
el.style.height="18px"
el.style.background="#ff2fa3"
el.style.borderRadius="50%"
el.style.border="3px solid white"
el.style.cursor="pointer"

const marker=new mapboxgl.Marker(el)
.setLngLat(site.coords)
.addTo(STATE.map)

el.onclick=()=>openEncounter(site)

STATE.markers.push(marker)

})

}

/************************************************
ENCOUNTER CARD
************************************************/

async function openEncounter(site){

document.getElementById("encounter-title").innerText=site.name

document.getElementById("encounter-badge").innerText="Discovery"

document.getElementById("encounter-description").innerText=
"A cultural discovery along your walk."

const img=document.getElementById("encounter-image")

/* fetch wikipedia image */

if(site.name){

const wikiImage = await fetchWikipediaImage(site.name)

if(wikiImage){

img.src=wikiImage
img.style.display="block"

}else{

img.style.display="none"

}

}else{

img.style.display="none"

}

document.getElementById("encounter").style.display="block"

}

function closeEncounter(){

document.getElementById("encounter").style.display="none"

}

/************************************************
WIKIPEDIA IMAGE FETCH
************************************************/

async function fetchWikipediaImage(title){

try{

const url =
"https://en.wikipedia.org/api/rest_v1/page/summary/" +
encodeURIComponent(title)

const res = await fetch(url)

const data = await res.json()

return data.thumbnail?.source || null

}catch(e){

return null

}

}
/************************************************
PREVIEW ENGINE
************************************************/

async function previewJourney(){

if(!STATE.routeCoords){
alert("Generate a route first")
return
}

previewFrames=[]

const points=[
STATE.routeCoords[0],
...STATE.encounters.map(e=>e.coords)
]

for(const coord of points){

STATE.map.flyTo({
center:coord,
zoom:17,
pitch:65,
duration:1400
})

pulseEncounter(coord)

await sleep(1500)

/* capture frame */

const frame = STATE.map.getCanvas().toDataURL("image/jpeg")

previewFrames.push(frame)

}

openPreviewPlayer()

}


/************************************************
PREVIEW PLAYER
************************************************/

function openPreviewPlayer(){

if(!previewFrames.length){
alert("No preview frames were generated.")
return
}

const player=document.getElementById("preview-player")
const frame=document.getElementById("preview-frame")

player.style.display="flex"
STATE.previewFrameIndex=0
frame.src=previewFrames[0]

if(STATE.previewInterval){
clearInterval(STATE.previewInterval)
}

STATE.previewInterval=setInterval(()=>{
if(!previewFrames.length) return
STATE.previewFrameIndex=(STATE.previewFrameIndex+1)%previewFrames.length
frame.src=previewFrames[STATE.previewFrameIndex]
},900)

}

function endPreview(){

const player=document.getElementById("preview-player")
player.style.display="none"

if(STATE.previewInterval){
clearInterval(STATE.previewInterval)
STATE.previewInterval=null
}

}

/************************************************
ENCOUNTER PULSE EFFECT
************************************************/

function pulseEncounter(coord){

STATE.encounters.forEach(site=>{

const dist = distanceMeters(coord,site.coords)

if(dist < 80){

const marker = STATE.markers.find(m=>{

const p = m.getLngLat()

return Math.abs(p.lng-site.coords[0]) < 0.0001

})

if(marker){

const el = marker.getElement()

el.style.transform="scale(1.8)"

setTimeout(()=>{
el.style.transform="scale(1)"
},600)

}

}

})

}

/************************************************
STORY GENERATOR
************************************************/

async function createPreviewStory(){

const canvas=document.createElement("canvas")
canvas.width=1080
canvas.height=1920

const ctx=canvas.getContext("2d")

/* background */

ctx.fillStyle="#fff7ec"
ctx.fillRect(0,0,1080,1920)

/* title */

ctx.fillStyle="#ff2fa3"
ctx.font="bold 80px Inter"
ctx.fillText("Hot Girl Walk",180,180)

ctx.fillStyle="#333"
ctx.font="40px Inter"
ctx.fillText("My Cultural Discoveries",180,260)

/* map preview */

const mapCanvas=STATE.map.getCanvas()

ctx.drawImage(mapCanvas,90,380,900,900)

/* discoveries list */

ctx.fillStyle="#ff2fa3"
ctx.font="36px Inter"

let y=1350

STATE.encounters.forEach(site=>{
ctx.fillText("• "+site.name,140,y)
y+=60
})

/* export story */

canvas.toBlob(async blob=>{

if(!blob) return

const file=new File([blob],"hot-girl-walk-story.png",{type:"image/png"})

if(navigator.share){

try{

await navigator.share({
files:[file],
title:"Hot Girl Walk",
text:"My cultural walk"
})

}catch(e){

/* ignore cancelled share */

}

}else{

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="hot-girl-walk-story.png"
a.click()

}

endPreview()

})

}

/************************************************
WALK MODE
************************************************/

function startWalk(){

if(!STATE.map){
alert("Start the app first.")
return
}

if(!navigator.geolocation){
alert("Geolocation is not supported in this browser.")
return
}

if(STATE.walkWatcher){
navigator.geolocation.clearWatch(STATE.walkWatcher)
STATE.walkWatcher=null
}

document.getElementById("walk-indicator").style.display="block"

STATE.walkWatcher=navigator.geolocation.watchPosition(updateUserPosition,()=>{
alert("Unable to start walk tracking. Please allow location access.")
})

}

function stopWalk(){

if(STATE.walkWatcher){
navigator.geolocation.clearWatch(STATE.walkWatcher)
STATE.walkWatcher=null
}

document.getElementById("walk-indicator").style.display="none"

}

/************************************************
USER GPS TRACKING
************************************************/

function updateUserPosition(pos){

const coords=[pos.coords.longitude,pos.coords.latitude]

if(!STATE.userMarker){

STATE.userMarker=new mapboxgl.Marker({color:"#2b7cff"})
.setLngLat(coords)
.addTo(STATE.map)

}else{

STATE.userMarker.setLngLat(coords)

}

STATE.map.easeTo({
center:coords,
zoom:16
})

}

</script>
</body>
