<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Hot Girl Walks</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>

body{
margin:0;
font-family:Inter, sans-serif;
overflow:hidden;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* ===============================
BRAT INTRO
=============================== */

#intro-overlay{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

display:flex;
align-items:center;
justify-content:center;

z-index:1000;

}

#intro-card{

width:60vw;
max-width:520px;
aspect-ratio:1/1;

background:#fff8f4;

border-radius:24px;

box-shadow:0 20px 60px rgba(0,0,0,0.35);

display:flex;
flex-direction:column;
justify-content:center;

gap:16px;

padding:36px;

}

.intro-bar{

font-size:52px;
font-weight:900;

padding:10px 18px;

color:white;

transform:translateX(-120%);
opacity:0;

letter-spacing:2px;

border-radius:8px;

}

.hot{
background:#ff2fa3;
animation:slideIn 0.7s forwards;
}

.girls{
background:#ff7fa5;
animation:slideIn 0.7s forwards;
animation-delay:0.2s;
}

.walk{
background:#4f7cff;
animation:slideIn 0.7s forwards;
animation-delay:0.4s;
}

#intro-start{

margin-top:16px;
padding:14px;

border:none;
border-radius:20px;

background:black;
color:white;

font-size:15px;
font-weight:600;

cursor:pointer;

}

@keyframes slideIn{

0%{
transform:translateX(-120%);
opacity:0;
}

80%{
transform:translateX(10px);
}

100%{
transform:translateX(0);
opacity:1;
}

}

/* ===============================
NAV
=============================== */

#top-nav{

position:fixed;
top:0;
left:0;
right:0;

height:50px;

background:white;

display:flex;
align-items:center;
justify-content:center;

gap:20px;

z-index:200;

box-shadow:0 2px 8px rgba(0,0,0,0.2);

}

#top-nav button{
border:none;
background:none;
font-weight:bold;
cursor:pointer;
}

/* ===============================
PLANNER
=============================== */

#planner{

position:fixed;
bottom:0;
left:0;
right:0;

background:white;

padding:16px;

border-radius:20px 20px 0 0;

box-shadow:0 -5px 20px rgba(0,0,0,0.2);

z-index:200;

transition:transform .3s;

}

#planner.collapsed{
transform:translateY(100%);
}

#planner input,
#planner select{

width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;

}

#planner button{

width:100%;
padding:10px;

border:none;
border-radius:20px;

background:#ff7fa5;
color:white;

margin-top:5px;

}

/* ===============================
WALK CONTROLS
=============================== */

#walk-controls{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:none;

gap:10px;

z-index:300;

}

#walk-controls button{

padding:10px 14px;
border:none;
border-radius:20px;

background:white;

box-shadow:0 2px 8px rgba(0,0,0,0.2);

}

/* ===============================
TOP TRUMPS CARD
=============================== */

#encounter{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%) rotate(-2deg);

width:320px;

background:#fff8f4;

border-radius:22px;

border:4px solid #ff2fa3;

box-shadow:0 20px 50px rgba(0,0,0,0.35);

padding:16px;

display:none;

z-index:600;

}

#encounter-photo{

width:100%;
height:180px;

object-fit:cover;

border-radius:12px;

margin-bottom:10px;

}

#encounter-title{

font-size:22px;
font-weight:700;

margin-bottom:10px;

}

.stat{

display:flex;
justify-content:space-between;

margin-bottom:6px;

font-weight:600;

}

.star{

font-size:20px;
cursor:pointer;

color:#ccc;

}

.star.active{
color:#ffd000;
}

#note{

margin-top:10px;

width:100%;
padding:8px;

border-radius:10px;

border:1px solid #ddd;

}

.card-buttons{

display:flex;
gap:10px;

margin-top:10px;

}

.card-buttons button{

flex:1;

padding:8px;

border:none;

border-radius:12px;

background:#ff2fa3;

color:white;

font-weight:600;

}

/* ===============================
CARD DECK (EXPLORE)
=============================== */

#card-deck{

position:fixed;

bottom:40px;
left:50%;

transform:translateX(-50%);

display:none;

z-index:500;

}

.deck-card{

width:220px;
height:300px;

background:white;

border-radius:20px;

border:3px solid #ff2fa3;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

position:absolute;

cursor:pointer;

}

</style>

</head>

<body>

<div id="intro-overlay">

<div id="intro-card">

<div class="intro-bar hot">HOT</div>
<div class="intro-bar girls">GIRLS</div>
<div class="intro-bar walk">WALK</div>

<button id="intro-start" onclick="startApp()">start exploring ✨</button>

</div>

</div>

<div id="top-nav">
<button onclick="modePlan()">Plan</button>
<button onclick="modeWalk()">Walk</button>
<button onclick="modeExplore()">Explore</button>
</div>

<div id="map"></div>

<div id="planner">

<h3>Plan your Hot Girl Walk</h3>

<input id="home" placeholder="Start postcode">
<input id="work" placeholder="Destination postcode">

<button onclick="createRoute()">Generate Walk</button>
<button onclick="startWalk()">Start Walk</button>

</div>

<div id="walk-controls">
<button onclick="pauseWalk()">Pause</button>
<button onclick="resumeWalk()">Resume</button>
<button onclick="endWalk()">End Walk</button>
</div>

<div id="encounter">

<img id="encounter-photo">

<h3 id="encounter-title"></h3>

<div class="stat">
<span>Beauty</span>
<span class="star">★ ★ ★ ★ ★</span>
</div>

<div class="stat">
<span>History</span>
<span class="star">★ ★ ★ ★ ★</span>
</div>

<div class="stat">
<span>Hidden Gem</span>
<span class="star">★ ★ ★ ★ ★</span>
</div>

<textarea id="note" placeholder="What did you notice?"></textarea>

<input type="file" id="photo">

<div class="card-buttons">

<button onclick="saveEncounter()">Save</button>
<button onclick="closeEncounter()">Close</button>

</div>

</div>

<div id="card-deck"></div>

<script>

const MAPBOX_TOKEN="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q"

const API_URL="https://script.google.com/macros/s/AKfycbynF6QPJUh5fR-yu8HtlDSDZyjy73LOARMynPphhdrufYeKwH9MqK7ci2XafG7biJQD/exec"

mapboxgl.accessToken=MAPBOX_TOKEN

const LONDON_BOUNDS=[[-0.563,51.261],[0.280,51.686]]

let map
let routeCoords=null
let markers=[]
let watchId=null
let userMarker=null
let currentSite=null

function startApp(){

const intro=document.getElementById("intro-overlay")

intro.style.transition="opacity .4s"
intro.style.opacity="0"

setTimeout(()=>{
intro.style.display="none"
},400)

initMap()

}

function initMap(){

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v12",
center:[-0.1276,51.5072],
zoom:11,
maxBounds:LONDON_BOUNDS
})

map.addControl(new mapboxgl.NavigationControl())

}

function modePlan(){
document.getElementById("planner").classList.remove("collapsed")
}

function modeWalk(){
startWalk()
}

function modeExplore(){
loadArchive()
}

async function createRoute(){

const home=document.getElementById("home").value
const work=document.getElementById("work").value

const res=await fetch(API_URL+"?action=route&home="+encodeURIComponent(home)+"&work="+encodeURIComponent(work))

const data=await res.json()

routeCoords=data.geometry.coordinates

drawRoute()

}

function drawRoute(){

const geo={
type:"FeatureCollection",
features:[{
type:"Feature",
geometry:{type:"LineString",coordinates:routeCoords}
}]
}

if(map.getSource("route")){
map.getSource("route").setData(geo)
}else{

map.addSource("route",{type:"geojson",data:geo})

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff2fa3",
"line-width":6
}
})

}

}

function openEncounter(site){

currentSite=site

document.getElementById("encounter-title").innerText=site.name

document.getElementById("encounter").style.display="block"

}

function closeEncounter(){

document.getElementById("encounter").style.display="none"

}

async function saveEncounter(){

const note=document.getElementById("note").value

const payload={
action:"encounter",
user_id:"demo_user",
site_name:currentSite.name,
route_id:"route",
note:note,
lat:currentSite.coords[1],
lng:currentSite.coords[0]
}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Saved!")

}

async function loadArchive(){

const deck=document.getElementById("card-deck")

deck.innerHTML=""
deck.style.display="block"

const data=await fetch(API_URL+"?action=encounters").then(r=>r.json())

data.forEach((e,i)=>{

const card=document.createElement("div")
card.className="deck-card"

card.style.transform=`rotate(${i*5-10}deg) translateX(${i*30}px)`

card.onclick=()=>openEncounter({
name:e.site_name,
coords:[e.lng,e.lat]
})

deck.appendChild(card)

})

}

</script>

</body>
</html>
