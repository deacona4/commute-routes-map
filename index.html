<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cultural Walk Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{margin:0;font-family:Arial;}

#map{width:100%;height:100vh;}

#route-input{
position:absolute;
top:20px;
left:20px;
z-index:2;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

#route-input input{
display:block;
margin-bottom:6px;
padding:6px;
width:170px;
}

#route-input button{
width:100%;
padding:6px;
}

</style>
</head>

<body>

<div id="route-input">
<input id="home" placeholder="Start location">
<input id="work" placeholder="Destination">
<button onclick="createRoute()">Show Route</button>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

mapboxgl.accessToken="pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const API_URL="https://script.google.com/macros/s/AKfycbz0BqxLHAajt3BKJJC0P6tr8DPVOd-MV8l2UBlh90dHImV3mrrv2Qa80Q7-yHkHNHxc/exec";

let markers=[];

const culturalSites=[
{name:"Tate Modern",coords:[-0.0994,51.5076]},
{name:"Globe Theatre",coords:[-0.0973,51.5081]},
{name:"St Pauls Cathedral",coords:[-0.0983,51.5138]},
{name:"Whitechapel Gallery",coords:[-0.0719,51.5162]},
{name:"Imperial War Museum",coords:[-0.1087,51.4966]},
{name:"Dennis Severs House",coords:[-0.0736,51.5235]},
{name:"Museum of London",coords:[-0.0956,51.5175]},
{name:"Guildhall Art Gallery",coords:[-0.0922,51.5155]}
];

const map=new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});

function createRoute(){
async function loadEncounters(coords){

const line=turf.lineString(coords);

/* create corridor around route */

const corridor=turf.buffer(line,0.3,{units:"kilometers"});

/* fetch cultural sites */

let culturalSites=await fetchCulturalSites(line);

/* filter to corridor */

culturalSites=culturalSites.filter(site=>{

return turf.booleanPointInPolygon(
turf.point(site.coords),
corridor
);

});

/* fallback if none found */

if(culturalSites.length===0){
console.log("No cultural sites near route");
return;
}

placeEncounters(coords,culturalSites);

}

function placeEncounters(coords,culturalSites){

}
const home=document.getElementById("home").value;
const work=document.getElementById("work").value;

fetch(API_URL+"?action=route&home="+encodeURIComponent(home)+"&work="+encodeURIComponent(work))
.then(r=>r.json())
.then(data=>{

/* THIS MATCHES YOUR APPS SCRIPT */

const coords=data.geometry.coordinates;

const geojson={
"type":"FeatureCollection",
"features":[
{
"type":"Feature",
"geometry":{
"type":"LineString",
"coordinates":coords
}
}
]
};

if(map.getSource("route")){
map.getSource("route").setData(geojson);
}else{

map.addSource("route",{type:"geojson",data:geojson});

map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{
"line-color":"#ff5500",
"line-width":6
}
});

}
async function fetchCulturalSites(line){

const bbox=turf.bbox(line);

const query=`
[out:json];
(
node["tourism"~"museum|artwork|gallery"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["historic"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
node["amenity"~"theatre|arts_centre|music_venue"](${bbox[1]},${bbox[0]},${bbox[3]},${bbox[2]});
);
out;
`;

const url="https://overpass-api.de/api/interpreter";

const res=await fetch(url,{
method:"POST",
body:query
});

const data=await res.json();

return data.elements.map(el=>({
name:el.tags.name || "Cultural site",
coords:[el.lon,el.lat],
type:el.tags.tourism || el.tags.historic || el.tags.amenity
}));

}
loadEncounters(coords);

});

}

function placeEncounters(coords){

markers.forEach(m=>m.remove());
markers=[];

const line=turf.lineString(coords);
const corridor=turf.buffer(line,0.3,{units:"kilometers"});
const length=turf.length(line);

const segments=4;
let used=new Set();

for(let i=1;i<=segments;i++){

const pt=turf.along(line,length/segments*i);

let best=null;
let min=999;
culturalSites.forEach(site=>{

const inside=turf.booleanPointInPolygon(
turf.point(site.coords),
corridor
);

if(!inside) return;

if(used.has(site.name))return;

const d=turf.distance(pt,turf.point(site.coords));

if(d<min){
min=d;
best=site;
}

});

if(best){

used.add(best.name);

const marker=new mapboxgl.Marker({color:"red"})
.setLngLat(best.coords)
.setPopup(new mapboxgl.Popup().setHTML(best.name))
.addTo(map);

markers.push(marker);

}

}

}

</script>

</body>
</html>
