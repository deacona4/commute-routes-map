<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cultural Walk Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
width:100%;
height:100vh;
}

#route-input{
position:absolute;
top:20px;
left:20px;
z-index:2;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
}

#route-input input{
display:block;
margin-bottom:6px;
padding:6px;
width:170px;
}

#route-input button{
padding:6px;
width:100%;
cursor:pointer;
}

.legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
font-size:14px;
z-index:2;
}

.legend div{
margin-bottom:5px;
}

.user-route-box{
width:20px;
height:4px;
background:#ff5500;
display:inline-block;
margin-right:6px;
}

.culture-box{
width:10px;
height:10px;
background:red;
display:inline-block;
margin-right:6px;
}

</style>
</head>

<body>

<div id="route-input">

<input id="home" placeholder="Start location">
<input id="work" placeholder="Destination">

<button onclick="createRoute()">Show Route</button>

</div>

<div id="map"></div>

<div class="legend">
<div><span class="user-route-box"></span>Your Route</div>
<div><span class="culture-box"></span>Cultural Encounters</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

mapboxgl.accessToken = "pk.eyJ1IjoiYmlnYWwxIiwiYSI6ImNtbWIzODZuaDA0cWYycXIyMXVydmx1eDkifQ.2tS6Ro5jbDlGjbR74_Ox0Q";

const API_URL = "https://script.google.com/macros/s/AKfycbyUuMmIknHTwP3hoKYYw0-eka1wk3X8BJSOqLua4q4DIVDCGhWaa6LUTeILGjEQv33L/exec";

let culturalSites = [];
let encounterMarkers = [];

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[-0.1276,51.5072],
zoom:11
});

map.on('load', function () {

loadCulturalSites();

});

function createRoute(){

const home = document.getElementById("home").value;
const work = document.getElementById("work").value;

if(!home || !work){
alert("Please enter both locations");
return;
}

const url =
API_URL +
"?action=route" +
"&home=" + encodeURIComponent(home) +
"&work=" + encodeURIComponent(work);

fetch(url)
.then(res => res.json())
.then(route => {

if(map.getSource("user-route")){
map.getSource("user-route").setData(route);
} else {

map.addSource("user-route",{
type:"geojson",
data:route
});

map.addLayer({
id:"user-route",
type:"line",
source:"user-route",
paint:{
"line-color":"#ff5500",
"line-width":6
}
});

}

showEncounters(route);

});

}

function loadCulturalSites(){

const query = `
[out:json];
(
node["tourism"="museum"](51.2,-0.6,51.9,0.4);
node["tourism"="gallery"](51.2,-0.6,51.9,0.4);
node["tourism"="artwork"](51.2,-0.6,51.9,0.4);
node["amenity"="theatre"](51.2,-0.6,51.9,0.4);
node["historic"="memorial"](51.2,-0.6,51.9,0.4);
node["historic"="monument"](51.2,-0.6,51.9,0.4);
node["historic"="building"](51.2,-0.6,51.9,0.4);
);
out;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(res => res.json())
.then(data => {

data.elements.forEach(place => {

if(place.lat && place.lon){

culturalSites.push({
type:"Feature",
geometry:{
type:"Point",
coordinates:[place.lon,place.lat]
},
properties:{
name:place.tags?.name || "Cultural Site"
}
});

}

});

});

}

function showEncounters(route){

if(culturalSites.length === 0){
setTimeout(()=>showEncounters(route),500);
return;
}

encounterMarkers.forEach(marker => marker.remove());
encounterMarkers = [];

const routeLine = turf.lineString(route.features[0].geometry.coordinates);

const buffer = turf.buffer(routeLine,0.5,{units:"kilometers"});

const nearbySites = culturalSites.filter(site=>{
return turf.booleanPointInPolygon(site,buffer);
});

if(nearbySites.length===0) return;

const routeLength = turf.length(routeLine,{units:"kilometers"});

const segments = 4;

for(let i=1;i<=segments;i++){

const distance = (routeLength/segments)*i;

const point = turf.along(routeLine,distance,{units:"kilometers"});

let closest=null;
let minDist=Infinity;

nearbySites.forEach(site=>{

const dist = turf.distance(point,site,{units:"kilometers"});

if(dist<minDist){
minDist=dist;
closest=site;
}

});

if(closest){

const marker = new mapboxgl.Marker({color:"red"})
.setLngLat(closest.geometry.coordinates)
.setPopup(new mapboxgl.Popup().setHTML(closest.properties.name))
.addTo(map);

encounterMarkers.push(marker);

}

}

}

</script>

</body>
</html>
