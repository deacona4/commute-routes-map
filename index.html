!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>London Commute Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

// MAPBOX TOKEN
mapboxgl.accessToken = 'PASTE YOUR TOKEN HERE';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/light-v11',
center: [-0.1276, 51.5072], // London
zoom: 11
});

map.on('load', () => {

fetch("https://script.google.com/macros/s/AKfycbzvBuo6pFVBbMO2JWD-YEHtftkvl5DsmCZPTRkwLLxMezVwKOlWxc0OIL1vXphQZWa0/exec")
.then(response => response.json())
.then(data => {

console.log("DATA:", data);

data.forEach(place => {

new mapboxgl.Marker()
.setLngLat([parseFloat(place.lng), parseFloat(place.lat)])
.setPopup(
new mapboxgl.Popup().setHTML(`<b>${place.name}</b>`)
)
.addTo(map);

});

})
.catch(error => {
console.error("Error loading data:", error);
});

});

</script>

</body>
</html>
